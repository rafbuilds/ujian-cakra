<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard Guru — Ujian Online</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="sidebar">
        <div class="sb-logo">
          <div class="sb-logo-title">📋 Ujian Online</div>
          <div class="sb-logo-sub">SMAN 1 Batangan</div>
        </div>
        <div class="sb-nav">
          <div class="sb-section">MENU</div>
          <a href="dashboard.html" class="sb-item active"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"
                stroke-linecap="round"
              />
              <polyline
                points="9 22 9 12 15 12 15 22"
                stroke-linecap="round"
              /></svg
            >Dashboard</a
          >
          <a href="ujian.html" class="sb-item"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                stroke-linecap="round"
              /></svg
            >Daftar Ujian</a
          >
          <a href="pengawas.html" class="sb-item"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M15 10l4.553-2.069A1 1 0 0121 8.82V15.18a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"
                stroke-linecap="round"
              /></svg
            >Pengawas Live</a
          >
          <a href="nilai.html" class="sb-item"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <line x1="18" y1="20" x2="18" y2="10" stroke-linecap="round" />
              <line x1="12" y1="20" x2="12" y2="4" stroke-linecap="round" />
              <line x1="6" y1="20" x2="6" y2="14" stroke-linecap="round" /></svg
            >Nilai & Rekap</a
          >
          <a href="siswa.html" class="sb-item"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"
                stroke-linecap="round"
              />
              <circle cx="9" cy="7" r="4" /></svg
            >Data Siswa</a
          >
          <a href="mapel.html" class="sb-item"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                stroke-linecap="round"
              /></svg
            >Mata Pelajaran</a
          >
        </div>
        <div class="sb-user">
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 8px;
            "
          >
            <div class="sb-avatar" id="sb-avatar">G</div>
            <div>
              <div class="sb-user-name" id="sb-user-name">Guru</div>
              <div class="sb-user-role">Guru Pengampu</div>
            </div>
          </div>
          <button class="sb-logout" onclick="Auth.logout()">⏻ Keluar</button>
        </div>
      </nav>
      <div class="main-wrap">
        <div class="topbar">
          <div class="topbar-title">Dashboard</div>
          <div class="topbar-right">
            <button
              class="btn btn-primary"
              onclick="location.href = 'ujian.html'"
            >
              + Buat Ujian
            </button>
          </div>
        </div>
        <div class="page-main">
          <div class="stat-grid">
            <div class="stat-card">
              <div class="stat-num" id="st-ujian">—</div>
              <div class="stat-label">Total Ujian</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-ongoing">—</div>
              <div class="stat-label">Berlangsung</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-siswa">—</div>
              <div class="stat-label">Siswa Diampu</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-kelas">—</div>
              <div class="stat-label">Kelas Diampu</div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <!-- Kelas Diampu -->
            <div class="card">
              <div class="card-header">
                <div class="card-title">🏫 Kelas yang Diampu</div>
                <button
                  class="btn btn-primary btn-sm"
                  onclick="openTambahKelas()"
                >
                  + Tambah
                </button>
              </div>
              <div id="kelas-list" style="margin-top: 0.75rem">
                <div class="loading-spinner"></div>
              </div>
            </div>

            <!-- Ujian Terbaru -->
            <div class="card">
              <div class="card-header">
                <div class="card-title">📋 Ujian Terbaru</div>
                <a
                  href="ujian.html"
                  style="font-size: 12px; color: var(--green3)"
                  >Lihat semua →</a
                >
              </div>
              <div id="ujian-list" style="margin-top: 0.75rem">
                <div class="loading-spinner"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Tambah Kelas -->
    <div
      id="modal-kelas"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        backdrop-filter: blur(4px);
      "
    >
      <div
        style="
          background: #fff;
          border-radius: 18px;
          padding: 2rem;
          max-width: 400px;
          width: 100%;
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
          "
        >
          <div style="font-weight: 700; font-size: 18px; color: var(--green)">
            Tambah Kelas Diampu
          </div>
          <button
            onclick="
              document.getElementById('modal-kelas').style.display = 'none'
            "
            style="
              background: none;
              border: none;
              font-size: 22px;
              cursor: pointer;
            "
          >
            ✕
          </button>
        </div>
        <div class="form-group">
          <label>Pilih Kelas</label>
          <select class="form-control" id="kelas-select">
            <option value="">— Pilih kelas —</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 1rem">
          <button
            class="btn btn-secondary"
            style="flex: 1"
            onclick="
              document.getElementById('modal-kelas').style.display = 'none'
            "
          >
            Batal
          </button>
          <button
            class="btn btn-primary"
            style="flex: 1"
            onclick="tambahKelas()"
          >
            Tambah
          </button>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      if (!Auth.requireRole(["guru"])) throw new Error();
      UI.initSidebar();
      let myKelas = [],
        allKelas = [];

      async function load() {
        const [exams, kelas, allK, siswa] = await Promise.all([
          API.get("/api/exams"),
          API.get("/api/guru/taught-classes"),
          API.get("/api/classes"),
          API.get("/api/guru/siswa").catch(() => []),
        ]);
        myKelas = kelas;
        allKelas = allK;

        const ongoing = exams.filter((e) =>
          ["published", "ongoing"].includes(e.status),
        );
        document.getElementById("st-ujian").textContent = exams.length;
        document.getElementById("st-ongoing").textContent = ongoing.length;
        document.getElementById("st-siswa").textContent = siswa.length;
        document.getElementById("st-kelas").textContent = kelas.length;

        // Kelas list
        document.getElementById("kelas-list").innerHTML = kelas.length
          ? '<div style="display:flex;flex-wrap:wrap;gap:7px">' +
            kelas
              .map(
                (k) => `
        <div style="display:flex;align-items:center;gap:6px;background:var(--green4);border:1px solid rgba(29,158,117,.2);border-radius:8px;padding:5px 10px">
          <span style="font-size:13px;font-weight:600;color:var(--green)">${k.name}</span>
          <button onclick="hapusKelas('${k.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px">×</button>
        </div>`,
              )
              .join("") +
            "</div>"
          : '<div style="font-size:13px;color:var(--muted)">Belum ada kelas. Klik + Tambah untuk menambahkan.</div>';

        // Ujian list
        document.getElementById("ujian-list").innerHTML =
          exams
            .slice(0, 5)
            .map(
              (e) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.625rem 0;border-bottom:.5px solid var(--border)">
      <div>
        <a href="soal.html?id=${e.id}" style="font-weight:500;font-size:13px;color:var(--text);text-decoration:none">${e.title || ""}</a>
        <div style="font-size:11px;color:var(--muted)">${e.subject_name || "—"} · ${e.class_names || ""}</div>
      </div>
      <span style="background:${e.status === "ongoing" ? "#eaf3de" : e.status === "published" ? "#e6f1fb" : "var(--light)"};color:${e.status === "ongoing" ? "#3b6d11" : e.status === "published" ? "#185fa5" : "var(--muted)"};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600">
        ${e.status === "draft" ? "Draft" : e.status === "published" ? "Terbuka" : e.status === "ongoing" ? "Berlangsung" : "Selesai"}
      </span>
    </div>`,
            )
            .join("") ||
          '<div style="font-size:13px;color:var(--muted)">Belum ada ujian</div>';
      }

      async function openTambahKelas() {
        const existing = myKelas.map((k) => k.id);
        document.getElementById("kelas-select").innerHTML =
          '<option value="">— Pilih kelas —</option>' +
          allKelas
            .filter((k) => !existing.includes(k.id))
            .map((k) => `<option value="${k.id}">${k.name}</option>`)
            .join("");
        document.getElementById("modal-kelas").style.display = "flex";
      }

      async function tambahKelas() {
        const id = document.getElementById("kelas-select").value;
        if (!id) {
          UI.toast("Pilih kelas dulu", "warn");
          return;
        }
        await API.post("/api/guru/taught-classes", { class_id: id });
        UI.toast("✅ Kelas ditambahkan", "success");
        document.getElementById("modal-kelas").style.display = "none";
        load();
      }

      async function hapusKelas(id) {
        const kls = myKelas.find((k) => k.id === id);
        UI.confirm(
          "Hapus Kelas",
          "Hapus kelas <strong>" + (kls?.name || id) + "</strong>?",
          async () => {
            await API.del("/api/guru/taught-classes/" + id);
            UI.toast("Kelas dihapus", "success");
            load();
          },
        );
      }

      load();
    </script>
  </body>
</html>
