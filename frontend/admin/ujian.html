<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<link rel="stylesheet" href="../style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sb-logo"><div class="sb-logo-title">⚙️ Admin Panel</div><div class="sb-logo-sub">SMAN 1 Batangan</div></div>
    <div class="sb-nav">
      <div class="sb-section">MENU</div>
      <a href="dashboard.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round"/></svg>Dashboard</a>
      <a href="siswa.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round"/><circle cx="9" cy="7" r="4"/></svg>Data Siswa</a>
      <a href="rooms.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round"/></svg>Room Ujian</a>
          <a href="ujian.html" class="sb-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round"/></svg>Semua Ujian</a>
      <a href="settings.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke-linecap="round"/></svg>Pengaturan</a>
    </div>
    <div class="sb-user">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div><div class="sb-user-name" id="sb-user-name">Admin</div><div class="sb-user-role">Administrator</div></div>
      </div>
      <button class="sb-logout" onclick="Auth.logout()">⏻ Keluar</button>
    </div>
  </nav>
  <div class="main-wrap">
    <div class="topbar"><div class="topbar-title">Semua Ujian</div></div>
    <div class="page-main">
      <div style="display:flex;gap:8px;margin-bottom:.875rem;flex-wrap:wrap">
        <select id="fs" onchange="load()" class="form-control" style="width:auto">
          <option value="">Semua Status</option>
          <option value="draft">Draft</option>
          <option value="published">Terbuka</option>
          <option value="ongoing">Berlangsung</option>
          <option value="finished">Selesai</option>
        </select>
        <input id="fq" type="text" placeholder="🔍 Cari judul atau guru..." oninput="load()"
          style="flex:1;max-width:300px;padding:8px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px"/>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Judul Ujian</th><th>Guru</th><th>Mapel</th><th>Soal</th><th>Status</th><th>Waktu Mulai</th><th>Aksi</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../config.js"></script>
<script src="../components/api.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/common.js"></script>
<script>
if(!Auth.requireRole(['admin'])) throw new Error();
UI.initSidebar();

const STATUS = {
  draft:'<span style="background:var(--light);color:var(--muted);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">Draft</span>',
  published:'<span style="background:#e6f1fb;color:#185fa5;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">Terbuka</span>',
  ongoing:'<span style="background:#eaf3de;color:#3b6d11;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">Berlangsung</span>',
  finished:'<span style="background:#faeeda;color:#854f0b;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">Selesai</span>',
};

async function load() {
  const status = document.getElementById('fs').value;
  const q = document.getElementById('fq').value.toLowerCase();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem"><div class="loading-spinner" style="margin:auto"></div></td></tr>';
  try {
    let exams = await API.get('/api/admin/exams');
    if(status) exams = exams.filter(e=>e.status===status);
    if(q) exams = exams.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.teacher_name||'').toLowerCase().includes(q));
    if(!exams.length) { tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">Belum ada ujian</td></tr>'; return; }
    tbody.innerHTML = exams.map(e=>`<tr>
      <td><div style="font-weight:500">${e.title||''}</div><div style="font-size:11px;color:var(--muted)">${e.class_names||''}</div></td>
      <td style="font-size:13px">${e.teacher_name||'—'}</td>
      <td style="font-size:13px">${e.subject_name||'—'}</td>
      <td style="text-align:center"><span style="background:var(--green4);color:var(--green);padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700">${e.question_count||0}</span></td>
      <td>${STATUS[e.status]||e.status}</td>
      <td style="font-size:12px;color:var(--muted)">${UI.fmtDT(e.start_at)||'—'}</td>
      <td>
        <div class="action-btns">
          <a href="../guru/soal.html?id=${e.id}" target="_blank" class="btn btn-secondary btn-sm">👁 Soal</a>
          ${['ongoing','published'].includes(e.status)?`<button class="btn btn-secondary btn-sm" style="border-color:#e57373;color:#c62828" onclick="forceFinish('${e.id}','${(e.title||'').replace(/'/g,"\\'")}')">⏹ Paksa Selesai</button>`:''}
          <button class="btn btn-danger btn-sm" onclick="del('${e.id}','${(e.title||'').replace(/'/g,"\\'")}')">🗑 Hapus</button>
        </div>
      </td>
    </tr>`).join('');
  } catch { UI.toast('Gagal memuat ujian','error'); }
}

async function forceFinish(id, title) {
  UI.confirm('Paksa Selesaikan','Paksa selesaikan <strong>'+title+'</strong>? Semua siswa aktif akan di-submit.', async()=>{
    const r = await API.post('/api/admin/exams/'+id+'/force-finish');
    UI.toast('✅ '+r.submitted+' sesi di-submit','success'); load();
  });
}
async function del(id, title) {
  UI.confirm('Hapus Ujian','Hapus <strong>'+title+'</strong> beserta semua data?', async()=>{
    await API.del('/api/admin/exams/'+id);
    UI.toast('Ujian dihapus','success'); load();
  });
}

load();
</script>
</body>
</html>
