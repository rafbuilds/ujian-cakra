<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard Admin — Ujian Online</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="sidebar">
        <div class="sb-logo">
          <div class="sb-logo-title">⚙️ Admin Panel</div>
          <div class="sb-logo-sub">SMAN 1 Batangan</div>
        </div>
        <div class="sb-nav">
          <div class="sb-section">MENU</div>
          <a href="dashboard.html" class="sb-item active" id="nav-dashboard"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"
                stroke-linecap="round"
              />
              <polyline
                points="9 22 9 12 15 12 15 22"
                stroke-linecap="round"
              /></svg
            >Dashboard</a
          >
          <a href="siswa.html" class="sb-item" id="nav-siswa"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"
                stroke-linecap="round"
              />
              <circle cx="9" cy="7" r="4" /></svg
            >Data Siswa</a
          >
          <a href="ujian.html" class="sb-item" id="nav-ujian"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                stroke-linecap="round"
              /></svg
            >Semua Ujian</a
          >
          <a href="settings.html" class="sb-item" id="nav-settings"
            ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                stroke-linecap="round"
              /></svg
            >Pengaturan</a
          >
        </div>
        <div class="sb-user">
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 8px;
            "
          >
            <div class="sb-avatar" id="sb-avatar">A</div>
            <div>
              <div class="sb-user-name" id="sb-user-name">Admin</div>
              <div class="sb-user-role">Administrator</div>
            </div>
          </div>
          <button class="sb-logout" onclick="Auth.logout()">⏻ Keluar</button>
        </div>
      </nav>
      <div class="main-wrap">
        <div class="topbar"><div class="topbar-title">Dashboard</div></div>
        <div class="page-main">
          <!-- Stats -->
          <div class="stat-grid">
            <div class="stat-card">
              <div class="stat-num" id="st-guru">—</div>
              <div class="stat-label">Guru</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-siswa">—</div>
              <div class="stat-label">Siswa</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-ujian">—</div>
              <div class="stat-label">Total Ujian</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" id="st-device">—</div>
              <div class="stat-label">Device Terdaftar</div>
            </div>
          </div>

          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 1rem;
              margin-bottom: 1rem;
            "
          >
            <!-- Pengguna Guru -->
            <div class="card">
              <div class="card-header">
                <div class="card-title">👨‍🏫 Guru & Admin</div>
              </div>
              <div id="users-list"><div class="loading-spinner"></div></div>
              <div
                id="pending-section"
                style="
                  display: none;
                  margin-top: 1rem;
                  padding-top: 0.75rem;
                  border-top: 0.5px solid var(--border);
                "
              >
                <div
                  style="
                    font-size: 12px;
                    font-weight: 700;
                    color: var(--amber);
                    margin-bottom: 0.5rem;
                  "
                >
                  ⏳ MENUNGGU APPROVAL
                </div>
                <div id="pending-list"></div>
              </div>
            </div>

            <!-- Ujian Aktif -->
            <div class="card">
              <div class="card-title">📋 Ujian Berlangsung</div>
              <div id="ongoing-list"><div class="loading-spinner"></div></div>
            </div>
          </div>

          <!-- Kelas -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">🏫 Ringkasan Kelas</div>
            </div>
            <div
              id="classes-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 8px;
              "
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      if (!Auth.requireRole(["admin"])) throw new Error();
      UI.initSidebar();

      async function load() {
        try {
          const [users, exams, classes] = await Promise.all([
            API.get("/api/admin/users"),
            API.get("/api/admin/exams"),
            API.get("/api/admin/classes-detail"),
          ]);

          const gurus = users.filter((u) => u.role === "guru");
          const siswas = users.filter((u) => u.role === "siswa");
          const pending = users.filter((u) => u.role === "guru_pending");
          const devs = siswas.filter((u) => u.device_id).length;

          document.getElementById("st-guru").textContent = gurus.length;
          document.getElementById("st-siswa").textContent = siswas.length;
          document.getElementById("st-ujian").textContent = exams.length;
          document.getElementById("st-device").textContent = devs;

          // Users list
          const allStaff = [
            ...gurus,
            ...users.filter((u) => u.role === "admin"),
          ];
          document.getElementById("users-list").innerHTML =
            allStaff
              .map(
                (u) => `
      <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:.5px solid var(--border)">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">${(u.name || "?")[0]}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${u.name}</div>
          <div style="font-size:11px;color:var(--muted)">${u.email || ""}</div>
        </div>
        <span style="background:${u.role === "admin" ? "#e6f1fb" : "#eaf3de"};color:${u.role === "admin" ? "#185fa5" : "#3b6d11"};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600">${u.role === "admin" ? "Admin" : "Guru"}</span>
      </div>`,
              )
              .join("") ||
            '<div style="color:var(--muted);font-size:13px">Belum ada guru</div>';

          // Pending
          if (pending.length) {
            document.getElementById("pending-section").style.display = "block";
            document.getElementById("pending-list").innerHTML = pending
              .map(
                (u) => `
        <div style="display:flex;align-items:center;gap:8px;padding:.5rem 0">
          <div style="flex:1;font-size:13px">${u.name}</div>
          <button class="btn btn-primary btn-sm" onclick="approveGuru('${u.id}')">✓</button>
          <button class="btn btn-danger btn-sm" onclick="rejectGuru('${u.id}')">✗</button>
        </div>`,
              )
              .join("");
          }

          // Ongoing exams
          const ongoing = exams.filter((e) =>
            ["published", "ongoing"].includes(e.status),
          );
          document.getElementById("ongoing-list").innerHTML = ongoing.length
            ? ongoing
                .map(
                  (e) => `
          <div style="padding:.625rem 0;border-bottom:.5px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-weight:500;font-size:13px">${e.title || ""}</div>
                <div style="font-size:11px;color:var(--muted)">${e.teacher_name || "—"} · ${e.class_names || ""}</div>
              </div>
              <span style="background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600">Berlangsung</span>
            </div>
          </div>`,
                )
                .join("")
            : '<div style="color:var(--muted);font-size:13px;padding:.5rem">Tidak ada ujian aktif</div>';

          // Classes grid
          document.getElementById("classes-grid").innerHTML = classes
            .map(
              (c) => `
      <div style="background:var(--light);border-radius:10px;padding:.625rem;text-align:center">
        <div style="font-weight:700;font-size:15px;color:var(--green)">${c.name}</div>
        <div style="font-size:11px;color:var(--muted)">${c.student_count || 0} siswa</div>
      </div>`,
            )
            .join("");
        } catch (e) {
          UI.toast("Gagal memuat dashboard", "error");
        }
      }

      async function approveGuru(id) {
        await API.patch("/api/admin/users/" + id, { role: "guru" });
        UI.toast("✅ Guru disetujui", "success");
        load();
      }
      async function rejectGuru(id) {
        UI.confirm("Tolak Guru", "Hapus pendaftaran guru ini?", async () => {
          await API.del("/api/admin/users/" + id);
          UI.toast("Guru ditolak", "success");
          load();
        });
      }

      load();
    </script>
  </body>
</html>
