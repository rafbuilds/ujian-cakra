<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kelola Soal — CAKRA</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .q-card {
        background: var(--white);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 8px;
      }
      .q-num {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .q-text {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.6;
        margin-bottom: 0.875rem;
      }
      .q-options {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .opt-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 12px;
        border-radius: 9px;
        font-size: 13px;
      }
      /* ── Tipe soal selector ── */
      .type-btn {
        padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border2);
        background: var(--white); font-size: 12px; font-weight: 500; cursor: pointer;
        transition: all .15s; color: var(--text);
      }
      .type-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
      .type-btn:hover:not(.active) { border-color: var(--green); color: var(--green); }
      .yesno-btn {
        padding: 10px 28px; border-radius: 10px; border: 1.5px solid var(--border2);
        background: var(--white); font-size: 14px; font-weight: 600; cursor: pointer;
        transition: all .15s;
      }
      .yesno-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
      /* ── Soal card tipe badge ── */
      .q-type-badge {
        display: inline-block; padding: 2px 8px; border-radius: 6px;
        font-size: 10px; font-weight: 600; margin-left: 8px;
        background: var(--green4); color: var(--green);
      }
      .q-type-badge.audio { background: #e8f0fe; color: #1565c0; }
      .q-type-badge.camera { background: #fce8f3; color: #ad1457; }
      .q-type-badge.multi { background: #fff3e0; color: #e65100; }
      .q-type-badge.yesno { background: #e8f5e9; color: #2e7d32; }
      /* ── Attach preview ── */
      .attach-thumb { max-width: 100%; max-height: 120px; border-radius: 8px; margin-top: 8px; }

      .opt-row.correct {
        background: #eaf3de;
        border: 0.5px solid rgba(29, 158, 117, 0.3);
      }
      .opt-label {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .opt-label.correct {
        background: var(--green3);
        color: #fff;
      }
      .opt-label.wrong {
        background: var(--light);
        color: var(--muted);
      }
      .q-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 0.5px solid #f0ede5;
      }
      .add-soal-box {
        background: #fafaf8;
        border: 1.5px dashed var(--border2);
        border-radius: 12px;
        padding: 1.25rem;
        margin-top: 0.75rem;
      }
      .opt-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
      }
      .opt-letter {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .opt-letter.key {
        background: var(--green3);
        color: #fff;
      }
      .opt-letter.nokey {
        background: var(--light);
        color: var(--muted);
      }
      .exam-info-bar {
        background: var(--white);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      /* Kunci mode */
      .kunci-banner {
        background: linear-gradient(135deg, var(--green), var(--green2));
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .opt-kunci-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 11px 14px;
        margin-bottom: 6px;
        border-radius: 11px;
        cursor: pointer;
        border: 2px solid var(--border);
        background: var(--white);
        font-family: inherit;
        text-align: left;
        transition: all 0.15s;
      }
      .opt-kunci-btn.selected {
        border-color: var(--green);
        background: var(--green4);
      }
      .opt-kunci-letter {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .opt-kunci-letter.selected {
        background: var(--green);
        color: #fff;
      }
      .opt-kunci-letter.nosel {
        background: var(--light);
        color: var(--muted);
      }
    
      /* Admin mode: read-only indicators */
      .admin-badge { background:#e6f1fb;color:#185fa5;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav class="sidebar">
        <div class="sb-logo">
          <div class="sb-logo-title">🎯 CAKRA</div>
          <div class="sb-logo-sub" id="sb-logo-sub">Memuat...</div>
        </div>
        <div class="sb-nav">
          <div class="sb-section">MENU</div>
          <a href="dashboard.html" class="sb-item" id="nav-dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" />
            </svg>
            Dashboard
          </a>
          <a href="siswa.html" class="sb-item" id="nav-siswa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round" />
              <circle cx="9" cy="7" r="4" />
            </svg>
            Data Siswa
          </a>
          <a href="rooms.html" class="sb-item" id="nav-rooms">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round" />
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round" />
            </svg>
            Room Ujian
          </a>
          <a href="bank-soal.html" class="sb-item active" id="nav-bank-soal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round" />
            </svg>
            Bank Soal
          </a>
          <a href="settings.html" class="sb-item" id="nav-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                stroke-linecap="round"
              />
            </svg>
            Pengaturan
          </a>
        </div>

        <div class="sb-user">
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 8px;
            "
          >
            <div class="sb-avatar" id="sb-avatar">A</div>
            <div>
              <div class="sb-user-name" id="sb-user-name">Admin</div>
              <div class="sb-user-role">Administrator</div>
            </div>
          </div>
          <button class="sb-logout" onclick="Auth.logout()">⏻ Keluar</button>
        </div>
      </nav>

      <div class="main-wrap">
        <div class="topbar">
          <div style="display: flex; align-items: center; gap: 10px">
            <a
              href="bank-soal.html"
              onclick="if (document.referrer && document.referrer.includes(location.host)) { history.back(); return false; }"
              style="color: var(--muted); font-size: 13px; font-weight: 500"
              >← Kembali</a
            >
            <span style="color: var(--border)">/</span>
            <div class="topbar-title" id="exam-title-topbar">Kelola Soal</div>
          </div>
          <div class="topbar-right" id="topbar-actions"></div>
        </div>

        <div class="page-main">
          <div id="loading-state" style="text-align: center; padding: 3rem">
            <div class="loading-spinner"></div>
          </div>
          <div id="main-content" style="display: none">
            <!-- Info ujian -->
            <div class="exam-info-bar" id="exam-info-bar"></div>

            <!-- Mode lihat saja — admin tidak bisa ubah isi soal -->
            <div class="card" style="padding: 0.625rem 1.25rem; margin-bottom: 0.875rem; background: #e6f1fb; border: none">
              <div style="font-size: 12px; color: #185fa5">
                👁 Mode lihat saja — soal/kunci jawaban hanya bisa diubah oleh guru pembuatnya. Admin bisa lihat & unduh.
              </div>
            </div>

            <!-- Toolbar soal -->
            <div class="card" style="padding: 0.875rem 1.25rem">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  flex-wrap: wrap;
                  gap: 8px;
                "
              >
                <div style="font-weight: 600; font-size: 15px">
                  Soal (<span id="q-count">0</span>)
                </div>
                <button class="btn btn-primary btn-sm" onclick="downloadExam()">
                  📥 Download Soal Ujian Ini
                </button>
              </div>
            </div>

            <!-- Daftar soal -->
            <div id="soal-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      if (!Auth.requireRole(["admin"])) throw new Error();
      UI.initSidebar();

      const examId = new URLSearchParams(location.search).get("id");
      if (!examId) {
        location.href = "bank-soal.html";
        throw new Error();
      }

      let exam = null;

      async function load() {
        try {
          exam = await API.get(`/api/exams/${examId}`);
          render();
        } catch {
          UI.toast("Gagal memuat ujian", "error");
        }
      }

      function render() {
        document.getElementById("loading-state").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        document.getElementById("exam-title-topbar").textContent = exam.title;
        document.getElementById("q-count").textContent = exam.questions.length;

        // Info bar
        document.getElementById("exam-info-bar").innerHTML = `
    <div>
      <div style="font-weight:600;font-size:16px">${exam.title}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap">
        <span>📚 ${exam.subject_name || "—"}</span>
        <span>⏱ ${exam.duration_minutes} menit</span>
        <span>📅 ${exam.start_at ? UI.fmtDT(exam.start_at) : "Belum dijadwalkan (Bank Soal)"}</span>
        <span>👥 ${exam.classes?.map((c) => c.name).join(", ") || "—"}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      ${UI.examStatusBadge(exam.status)}
      ${exam.status === "draft" ? `<button class="btn btn-success btn-sm" onclick="publish()">Publish Ujian</button>` : ""}
      ${exam.status === "published" || exam.status === "ongoing" ? `<a href="../guru/pengawas.html?id=${examId}" class="btn btn-secondary btn-sm">👁 Monitor</a>` : ""}
    </div>
  `;

        // Topbar actions
        document.getElementById("topbar-actions").innerHTML = `
    ${exam.status === "draft" ? `<button class="btn btn-success btn-sm" onclick="publish()">✓ Publish</button>` : ""}
    <a href="../guru/pengawas.html?id=${examId}" class="btn btn-secondary btn-sm">👁 Monitor</a>
    <a href="../guru/nilai.html?id=${examId}" class="btn btn-secondary btn-sm">📊 Nilai</a>
  `;

        renderSoal();
      }

      function typeBadge(type) {
        const map = {
          multiple_choice: ['📝 Pilihan Ganda',''],
          multiple_answer: ['☑️ Jawaban Ganda','multi'],
          yes_no:          ['✅ Ya/Tidak','yesno'],
          audio:           ['🎵 Audio','audio'],
          camera_essay:    ['📷 Kamera+Uraian','camera'],
        };
        const [label, cls] = map[type] || ['📝 Pilihan Ganda',''];
        return `<span class="q-type-badge ${cls}">${label}</span>`;
      }

      function renderSoal() {
        const el = document.getElementById("soal-list");
        if (!exam.questions.length) {
          el.innerHTML = `<div class="card"><div class="empty-state"><div class="empty-icon">📝</div>
      <div class="empty-text">Belum ada soal di ujian ini.</div></div></div>`;
          return;
        }
        el.innerHTML = exam.questions
          .map(
            (q, i) => `
    <div class="q-card" id="qcard-${q.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div class="q-num">Soal ${i + 1} ${typeBadge(q.type||'multiple_choice')}</div>
          ${q.attachment_url ? `<div style="margin:6px 0"><a href="${q.attachment_url}" target="_blank" style="font-size:12px;color:var(--green)">📎 Lihat Lampiran</a></div>` : ''}
          ${q.audio_url ? `<div style="margin:6px 0"><audio controls src="${q.audio_url}" style="width:100%;height:36px"></audio></div>` : ''}
          <div class="q-text">${q.content}</div>
          ${(q.type==='yes_no') ? `<div style="display:flex;gap:8px;margin-top:8px"><span style="padding:4px 14px;border-radius:8px;font-size:13px;font-weight:600;background:${q.options?.find(o=>o.is_correct)?.label==='Ya'?'var(--green)':'var(--light)'};color:${q.options?.find(o=>o.is_correct)?.label==='Ya'?'#fff':'var(--text)'}">✅ Ya</span><span style="padding:4px 14px;border-radius:8px;font-size:13px;font-weight:600;background:${q.options?.find(o=>o.is_correct)?.label==='Tidak'?'var(--green)':'var(--light)'};color:${q.options?.find(o=>o.is_correct)?.label==='Tidak'?'#fff':'var(--text)'}">❌ Tidak</span></div>` : ''}
          ${(q.type==='camera_essay') ? `<div style="padding:8px;background:var(--green4);border-radius:8px;font-size:12px;color:var(--green);margin-top:6px">📷 Siswa menjawab dengan foto + uraian</div>` : ''}
          ${(q.type!=='yes_no'&&q.type!=='camera_essay') ? renderNormalOptions(q) : ''}
          <div class="q-footer">
            <div style="font-size:11px;color:var(--muted)">
              ${q.type==='multiple_answer' ? '☑️ Multi-kunci: '+q.options?.filter(o=>o.is_correct).map(o=>o.label).join(', ')+' · maks. pilihan siswa: '+(q.max_choices || q.options?.filter(o=>o.is_correct).length || 1)
                : q.type==='yes_no' ? '✅ Kunci: '+(q.options?.find(o=>o.is_correct)?.label||'—')
                : q.type==='camera_essay' ? '📷 Dinilai manual guru'
                : (q.options?.filter(o=>o.is_correct).length ? "Kunci: "+q.options.find(o=>o.is_correct)?.label : "⚠ Belum ada kunci")}
            </div>
          </div>
        </div>
      </div>
    </div>
  `,
          )
          .join("");
      }

      function renderNormalOptions(q) {
        return `<div class="q-options">${q.options
          .map(
            (o) => `
    <div class="opt-row ${o.is_correct ? "correct" : ""}">
      <div class="opt-label ${o.is_correct ? "correct" : "wrong"}">${o.label}</div>
      ${o.image_url ? `<img src="${o.image_url}" style="max-width:80px;max-height:60px;border-radius:6px;object-fit:cover"/>` : ""}
      <div>${o.content || ""}</div>
      ${o.is_correct ? '<span style="font-size:11px;color:var(--green3);font-weight:600;margin-left:auto">✓ Kunci</span>' : ""}
    </div>
  `,
          )
          .join("")}</div>`;
      }

      // ── Download Soal (1 ujian utuh) ────────────────────────────────
      async function downloadExam() {
        try {
          await API.download(
            `/api/exams/${examId}/export-soal`,
            `Soal_${(exam.title||'ujian').replace(/[\/\\:*?"<>|]/g,'-')}.docx`,
          );
        } catch (e) {
          UI.toast(e.error || "Gagal download soal", "error");
        }
      }

      async function publish() {
        if (!exam.questions.length) {
          UI.toast("Tambah soal dulu sebelum publish", "warn");
          return;
        }
        // Tipe camera_essay tidak wajib kunci (dinilai manual guru)
        const noKey = exam.questions.filter(
          (q) => q.type !== 'camera_essay' && !q.options?.some((o) => o.is_correct),
        );
        if (noKey.length) {
          UI.toast(
            `${noKey.length} soal belum punya kunci jawaban. Set kunci dulu.`,
            "warn",
          );
          return;
        }
        UI.confirm(
          "Publish Ujian",
          `Ujian "<strong>${exam.title}</strong>" akan dipublish dan bisa diakses siswa.`,
          async () => {
            await API.patch(`/api/exams/${examId}`, { status: "published" });
            UI.toast("✅ Ujian dipublish", "success");
            await load();
          },
          "success",
        );
      }

      load();
    </script>
  </body>
</html>
