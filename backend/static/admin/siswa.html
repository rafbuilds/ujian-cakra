<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Data Siswa — Admin</title>
<link rel="stylesheet" href="../style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sb-logo"><div class="sb-logo-title">⚙️ Admin Panel</div><div class="sb-logo-sub">SMAN 1 Batangan</div></div>
    <div class="sb-nav">
      <div class="sb-section">MENU</div>
      <a href="dashboard.html" class="sb-item" id="nav-dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round"/></svg>Dashboard</a>
      <a href="siswa.html" class="sb-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round"/><circle cx="9" cy="7" r="4"/></svg>Data Siswa</a>
      <a href="rooms.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round"/></svg>Room Ujian</a>
      <a href="ujian.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round"/></svg>Semua Ujian</a>
      <a href="settings.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke-linecap="round"/></svg>Pengaturan</a>
    </div>
    <div class="sb-user">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div><div class="sb-user-name" id="sb-user-name">Admin</div><div class="sb-user-role">Administrator</div></div>
      </div>
      <button class="sb-logout" onclick="Auth.logout()">⏻ Keluar</button>
    </div>
  </nav>
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-title">Data Siswa</div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="downloadTemplate()">⬇ Template</button>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('imp').click()">⬆ Import Excel</button>
        <input type="file" id="imp" accept=".xlsx,.xls" style="display:none" onchange="importSiswa(this)"/>
      </div>
    </div>
    <div class="page-main">

      <!-- Filter -->
      <div style="display:flex;gap:8px;margin-bottom:.875rem;flex-wrap:wrap">
        <select id="fg" onchange="load()" class="form-control" style="width:auto">
          <option value="">Semua Tingkat</option>
          <option value="10">Kelas 10</option>
          <option value="11">Kelas 11</option>
          <option value="12">Kelas 12</option>
        </select>
        <select id="fc" onchange="load()" class="form-control" style="width:auto"><option value="">Semua Kelas</option></select>
        <input id="fs" type="text" placeholder="🔍 Cari nama..." oninput="load()"
          style="flex:1;max-width:280px;padding:8px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px"/>
        <div style="margin-left:auto;font-size:13px;color:var(--muted);align-self:center" id="info"></div>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>#</th><th>Nama Siswa</th><th>NISN</th><th>Kelas</th><th>Device</th><th>Kode HP</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Edit -->
<div id="modal-edit" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:18px;padding:2rem;max-width:440px;width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div style="font-weight:700;font-size:18px;color:var(--green)">Edit Data Siswa</div>
      <button onclick="closeEdit()" style="background:none;border:none;font-size:22px;cursor:pointer">✕</button>
    </div>
    <input type="hidden" id="edit-id"/>
    <div class="form-group"><label>Nama Lengkap</label><input class="form-control" id="edit-name"/></div>
    <div class="form-group"><label>NISN</label><input class="form-control" id="edit-nisn" placeholder="Nomor Induk Siswa"/></div>
    <div class="form-group"><label>Kelas</label>
      <select class="form-control" id="edit-class"><option value="">— Pilih kelas —</option></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:1rem">
      <button class="btn btn-secondary" style="flex:1" onclick="closeEdit()">Batal</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveSiswa()">💾 Simpan</button>
    </div>
  </div>
</div>

<script src="../config.js"></script>
<script src="../components/api.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/common.js"></script>
<script>
if(!Auth.requireRole(['admin'])) throw new Error();
UI.initSidebar();
let allKelas = [];

async function init() {
  allKelas = await API.get('/api/classes');
  const sel = document.getElementById('fc');
  sel.innerHTML = '<option value="">Semua Kelas</option>' +
    allKelas.map(k=>`<option value="${k.id}">${k.name}</option>`).join('');
  document.getElementById('edit-class').innerHTML = '<option value="">— Pilih kelas —</option>' +
    allKelas.map(k=>`<option value="${k.id}">${k.name}</option>`).join('');
  load();
}

async function load() {
  const grade = document.getElementById('fg').value;
  const cls   = document.getElementById('fc').value;
  const search= document.getElementById('fs').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem"><div class="loading-spinner" style="margin:auto"></div></td></tr>';
  try {
    const p = new URLSearchParams({grade, class_id:cls, search, per_page:100});
    const r = await API.get('/api/admin/siswa?'+p);
    const data = r.data||r||[];
    document.getElementById('info').textContent = data.length+' siswa';
    if(!data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Tidak ada siswa</td></tr>';
      return;
    }
    tbody.innerHTML = data.map((s,i)=>`<tr>
      <td>${i+1}</td>
      <td><div style="font-weight:500">${s.name||''}</div><div style="font-size:11px;color:var(--muted)">${s.email||''}</div></td>
      <td style="font-size:12px">${s.nisn||'—'}</td>
      <td>${s.class_name||'—'}</td>
            <td>${s.device_id?'<span style="background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600">✓ Terdaftar</span>':'<span style="background:var(--light);color:var(--muted);padding:2px 8px;border-radius:20px;font-size:11px">Belum</span>'}</td>
      <td><span style="background:${s.last_login?'#eaf3de':'var(--light)'};color:${s.last_login?'#3b6d11':'var(--muted)'};padding:2px 8px;border-radius:20px;font-size:11px">${s.last_login?'Login':'Belum'}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn btn-secondary btn-sm" onclick='openEdit(${JSON.stringify(s)})'>✏️ Edit</button>
          ${s.device_id?`<button class="btn btn-secondary btn-sm" onclick="resetDev('${s.id}','${(s.name||'').replace(/'/g,"\\'")}')">📱 Reset HP</button>`:''}
          <button class="btn btn-danger btn-sm" onclick="delSiswa('${s.id}','${(s.name||'').replace(/'/g,"\\'")}')">🗑 Hapus</button>
        </div>
      </td>
    </tr>`).join('');
  } catch { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--red2)">Gagal memuat</td></tr>'; }
}

function openEdit(s) {
  document.getElementById('edit-id').value   = s.id;
  document.getElementById('edit-name').value = s.name||'';
  document.getElementById('edit-nisn').value = s.nisn||'';
  document.getElementById('edit-class').value= s.class_id||'';
  document.getElementById('modal-edit').style.display = 'flex';
}
function closeEdit() { document.getElementById('modal-edit').style.display='none'; }

async function saveSiswa() {
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('edit-name').value.trim();
  if(!name) { UI.toast('Nama tidak boleh kosong','warn'); return; }
  await API.patch('/api/admin/siswa/'+id, {
    name, nisn: document.getElementById('edit-nisn').value.trim(),
    class_id: document.getElementById('edit-class').value||null
  });
  UI.toast('✅ Data diperbarui','success'); closeEdit(); load();
}

async function resetDev(id, name, deviceId) {
  const kode = deviceId ? '<br><small style="font-family:monospace;color:var(--muted)">Kode: '+deviceId+'</small>' : '';
  UI.confirm('Reset Device HP',
    'Reset HP <strong>'+name+'</strong>?'+kode+'<br><br>Siswa harus login ulang dari HP baru.',
    async()=>{
      await API.post('/api/admin/siswa/'+id+'/reset-device');
      UI.toast('✅ Device '+name+' direset','success'); load();
  });
}
async function delSiswa(id, name) {
  UI.confirm('Hapus Siswa','Hapus <strong>'+name+'</strong>?', async()=>{
    await API.del('/api/admin/siswa/'+id);
    UI.toast('Siswa dihapus','success'); load();
  });
}
async function downloadTemplate() { await API.download('/api/admin/siswa/template','template_siswa.xlsx'); }
async function importSiswa(input) {
  const file = input.files[0]; if(!file) return;
  UI.loading(true,'Mengimport...');
  const fd = new FormData(); fd.append('file', file);
  try { await API.upload('/api/admin/siswa/import', fd); UI.toast('✅ Import berhasil','success'); load(); }
  catch(e) { UI.toast(e.error||'Gagal','error'); }
  finally { UI.loading(false); input.value=''; }
}

init();
</script>
</body>
</html>
