<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Ujian Online — SMAN 1 Batangan</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green: #0f4c35;
        --green2: #1a6b4a;
        --green3: #1d9e75;
        --green4: #f0faf4;
        --red: #a32d2d;
        --amber: #854f0b;
        --bg: #f7f6f2;
        --white: #fff;
        --border: #e2e0d8;
        --text: #2c2c2a;
        --muted: #888780;
        --light: #f1efe8;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        outline: none;
      }

      /* Login styles removed — login via index.html */

      /* DAFTAR UJIAN */
      .exam-list-page {
        min-height: 100vh;
      }
      .list-header {
        background: var(--green);
        padding: 1.25rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-av {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
      }
      .user-name {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }
      .user-class {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
      }
      .logout-btn {
        background: rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 9px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      .list-body {
        max-width: 680px;
        margin: 0 auto;
        padding: 1.5rem;
      }
      .list-welcome {
        margin-bottom: 1.5rem;
      }
      .list-welcome-name {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        color: var(--green);
      }
      .list-welcome-date {
        font-size: 13px;
        color: var(--muted);
        margin-top: 3px;
      }
      .exam-item {
        background: #fff;
        border: 0.5px solid var(--border);
        border-radius: 16px;
        padding: 1.125rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 14px;
        transition: all 0.2s;
        margin-bottom: 10px;
      }
      .exam-item.available {
        cursor: pointer;
      }
      .exam-item.available:hover {
        border-color: var(--green3);
        box-shadow: 0 4px 20px rgba(15, 76, 53, 0.1);
        transform: translateY(-2px);
      }
      .exam-icon {
        width: 48px;
        height: 48px;
        border-radius: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .exam-info {
        flex: 1;
        min-width: 0;
      }
      .exam-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .exam-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .start-btn {
        background: var(--green);
        color: #fff;
        padding: 9px 18px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .start-btn:hover {
        background: var(--green2);
      }
      .badge-avail {
        background: #eaf3de;
        color: #3b6d11;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-done {
        background: var(--light);
        color: var(--muted);
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }

      /* EXAM PAGE */
      .exam-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }
      .exam-topbar {
        background: #fff;
        border-bottom: 0.5px solid var(--border);
        padding: 0.875rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .exam-topbar-title {
        flex: 1;
        font-weight: 600;
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .timer {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        padding: 6px 14px;
        border-radius: 10px;
        transition: all 0.3s;
      }
      .timer.ok {
        background: var(--green4);
        color: var(--green);
      }
      .timer.warn {
        background: #faeeda;
        color: var(--amber);
      }
      .timer.danger {
        background: #fcebeb;
        color: var(--red);
        animation: pulse 0.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }
      .exam-body {
        display: flex;
        flex: 1;
        max-width: 1080px;
        width: 100%;
        margin: 0 auto;
        padding: 1.5rem;
        gap: 1.5rem;
      }
      .q-area {
        flex: 1;
      }
      .q-progress-bar-wrap {
        height: 5px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 6px;
      }
      .q-progress-bar {
        height: 100%;
        background: var(--green3);
        border-radius: 99px;
        transition: width 0.4s;
      }
      .q-progress-txt {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 1rem;
        font-weight: 500;
      }
      .q-card {
        background: #fff;
        border: 0.5px solid var(--border);
        border-radius: 18px;
        padding: 1.75rem;
        margin-bottom: 1rem;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      }
      .q-num-badge {
        display: inline-block;
        background: var(--green4);
        color: var(--green);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        margin-bottom: 1rem;
      }
      .q-text {
        font-size: 17px;
        font-weight: 500;
        line-height: 1.7;
        margin-bottom: 1.5rem;
        user-select: none;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .opt-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 16px;
        border-radius: 13px;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: all 0.17s;
        background: #fff;
        text-align: left;
        width: 100%;
        font-family: inherit;
      }
      .opt-btn:hover {
        border-color: var(--green3);
        background: var(--green4);
      }
      .opt-btn.selected {
        border-color: var(--green);
        background: var(--green4);
        box-shadow: 0 0 0 3px rgba(15, 76, 53, 0.08);
      }
      .opt-circle {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        flex-shrink: 0;
        transition: all 0.17s;
        position: relative;
      }
      .opt-btn.selected .opt-circle {
        background: var(--green);
        border-color: var(--green);
      }
      .opt-btn.selected .opt-circle::after {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .opt-label-box {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        flex-shrink: 0;
        transition: all 0.17s;
      }
      .opt-btn.selected .opt-label-box {
        background: var(--green);
        color: #fff;
      }
      .opt-text {
        font-size: 14px;
        line-height: 1.5;
        flex: 1;
        user-select: none;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 18px;
        border-radius: 11px;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.15s;
      }
      .nav-prev {
        background: var(--light);
        color: var(--text);
      }
      .nav-prev:hover {
        background: var(--border);
      }
      .nav-next {
        background: var(--green);
        color: #fff;
      }
      .nav-next:hover {
        background: var(--green2);
      }
      .submit-main {
        background: linear-gradient(135deg, var(--green), var(--green2));
        color: #fff;
        padding: 11px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 4px 14px rgba(15, 76, 53, 0.25);
        transition: all 0.2s;
      }
      .submit-main:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(15, 76, 53, 0.3);
      }
      /* Navigator */
      .q-nav-card {
        background: #fff;
        border: 0.5px solid var(--border);
        border-radius: 18px;
        padding: 1.25rem;
        position: sticky;
        top: 72px;
        width: 240px;
        flex-shrink: 0;
      }
      .q-dot-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        margin-bottom: 1rem;
      }
      .q-dot {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        border: 1.5px solid transparent;
      }
      .q-dot.unanswered {
        background: var(--light);
        color: var(--muted);
        border-color: var(--border);
      }
      .q-dot.answered {
        background: var(--green4);
        color: var(--green);
        border-color: rgba(29, 158, 117, 0.3);
      }
      .q-dot.current {
        background: var(--green);
        color: #fff;
        box-shadow: 0 2px 8px rgba(15, 76, 53, 0.3);
      }
      .q-dot:hover {
        transform: scale(1.1);
      }
      /* Violation toast */
      .violation-toast {
        position: fixed;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--red);
        color: #fff;
        border-radius: 13px;
        padding: 0.875rem 1.5rem;
        font-size: 14px;
        font-weight: 600;
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        animation: slideDown 0.3s ease;
      }
      @keyframes slideDown {
        from {
          transform: translateX(-50%) translateY(-20px);
          opacity: 0;
        }
        to {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }
      }
      .viol-count {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 99px;
        padding: 2px 8px;
        font-size: 13px;
      }
      /* Submit modal */
      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 1rem;
        backdrop-filter: blur(5px);
      }
      .modal-box {
        background: #fff;
        border-radius: 20px;
        padding: 2rem;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .modal-icon {
        font-size: 48px;
        margin-bottom: 0.875rem;
      }
      .modal-title {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        margin-bottom: 0.5rem;
      }
      .modal-sub {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 1.25rem;
      }
      .modal-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 1.25rem;
      }
      .modal-stat {
        background: var(--bg);
        border-radius: 12px;
        padding: 0.875rem;
      }
      .modal-stat-num {
        font-size: 24px;
        font-weight: 700;
      }
      .modal-stat-lbl {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      /* Result */
      .result-page {
        min-height: 100vh;
        background: linear-gradient(160deg, #0a3323, #0f4c35 50%, #1a6b4a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .result-card {
        background: #fff;
        border-radius: 24px;
        padding: 2.5rem;
        max-width: 460px;
        width: 100%;
        text-align: center;
      }
      .result-icon {
        font-size: 60px;
        margin-bottom: 0.875rem;
        animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes bounceIn {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }
      .result-score {
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        margin: 0.75rem 0;
      }
      /* Loading */
      .loading-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: var(--bg);
      }
      .spin {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--green3);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* ── Tipe soal tambahan ── */
      .yes-no-wrap { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:4px; }
      .yn-btn {
        padding:20px 12px; border-radius:16px; border:2px solid var(--border);
        background:#fff; font-size:15px; font-weight:700; cursor:pointer;
        display:flex; flex-direction:column; align-items:center; gap:8px;
        transition:all 0.17s; font-family:inherit;
      }
      .yn-btn .yn-emoji { font-size:32px; }
      .yn-btn:hover { border-color:var(--green3); background:var(--green4); }
      .yn-btn.selected { border-color:var(--green); background:var(--green4);
        box-shadow:0 0 0 3px rgba(15,76,53,.1); }
      .opt-checkbox {
        width:22px; height:22px; border-radius:5px; border:2px solid var(--border);
        flex-shrink:0; transition:all 0.17s; position:relative; background:#fff;
      }
      .opt-btn.multi-selected { border-color:var(--green); background:var(--green4); }
      .opt-btn.multi-selected .opt-checkbox {
        background:var(--green); border-color:var(--green);
      }
      .opt-btn.multi-selected .opt-checkbox::after {
        content:"✓"; position:absolute; inset:0; display:flex; align-items:center;
        justify-content:center; color:#fff; font-size:13px; font-weight:700;
      }
      .essay-wrap { display:flex; flex-direction:column; gap:10px; }
      .essay-info {
        display:flex; align-items:flex-start; gap:10px; padding:12px 14px;
        background:#fef9ec; border-radius:12px; border:1px solid #f5e6b2;
        font-size:13px; color:#7c5e08; line-height:1.5;
      }
      .essay-textarea {
        width:100%; min-height:140px; padding:12px 14px; border:1.5px solid var(--border);
        border-radius:12px; font-size:14px; font-family:inherit; resize:vertical;
        outline:none; line-height:1.6; transition:border-color 0.2s; color:var(--text);
      }
      .essay-textarea:focus { border-color:var(--green3); }
      .audio-player-wrap {
        display:flex; align-items:center; gap:14px; padding:14px 18px;
        background:#e8f0fe; border-radius:14px; margin-bottom:12px;
        border:1px solid rgba(21,101,192,.2);
      }
      .audio-play-btn {
        width:48px; height:48px; border-radius:50%; background:#1565c0;
        border:none; color:#fff; font-size:22px; cursor:pointer; display:flex;
        align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s;
      }
      .audio-play-btn:hover { background:#0d47a1; transform:scale(1.05); }
      @media (max-width: 768px) {
        .login-left {
          display: none;
        }
        .login-right {
          width: 100%;
          padding: 2rem 1.5rem;
          padding-top: 3rem;
        }
        .exam-body {
          flex-direction: column;
          padding: 1rem;
        }
        .q-nav-card {
          width: 100%;
          position: static;
          order: -1;
        }
        .q-dot-grid {
          grid-template-columns: repeat(8, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Lightbox zoom gambar (lampiran soal & pilihan jawaban) -->
    <div id="img-zoom-overlay" onclick="closeZoom()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out">
      <img id="img-zoom-target" src="" style="max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 10px 50px rgba(0,0,0,.5)"/>
      <button onclick="closeZoom()" style="position:fixed;top:16px;right:20px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;line-height:1">×</button>
    </div>

    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      // ── State ────────────────────────────────────────────────────
      let page = "loading",
        user = null,
        exams = [],
        examData = null,
        sessionData = null,
        _myFingerprint = null;
      let current = 0,
        answers = {},       // { qid: optionId | 'essay' | 'multi' }
        essayTexts = {},    // { qid: text }
        multiAnswers = {},  // { qid: Set<optionId> }
        violations = 0,
        showViolation = false,
        showSubmit = false;
      let timeLeft = 0,
        result = null,
        submitting = false,
        devMode = false;
      let timerInterval = null,
        saveInterval = null;

      function zoomImage(src) {
        document.getElementById("img-zoom-target").src = src;
        document.getElementById("img-zoom-overlay").style.display = "flex";
      }
      function closeZoom() {
        document.getElementById("img-zoom-overlay").style.display = "none";
      }

      const API_BASE =
        typeof CONFIG !== "undefined"
          ? CONFIG.API_BASE
          : "http://localhost:5000";
      let _token =
        localStorage.getItem("ujian_token") ||
        localStorage.getItem("siswa_token") ||
        "";
      const setToken = (t) => {
        _token = t;
        localStorage.setItem("ujian_token", t);
        localStorage.removeItem("siswa_token"); // hapus key lama
      };
      const apiFetch = async (path, opts = {}) => {
        const h = { "Content-Type": "application/json" };
        if (_token) h["Authorization"] = `Bearer ${_token}`;
        const res = await fetch(API_BASE + path, {
          ...opts,
          headers: { ...h, ...(opts.headers || {}) },
        });
        const d = await res.json().catch(() => ({}));
        if (!res.ok) throw d;
        return d;
      };

      // ── Render ───────────────────────────────────────────────────
      function render() {
        const root = document.getElementById("root");
        if (page === "loading") root.innerHTML = renderLoading("Memuat...");
        else if (page === "login") root.innerHTML = renderLogin();
        else if (page === "device-locked") root.innerHTML = renderDeviceLocked();
        else if (page === "list") root.innerHTML = renderList();
        else if (page === "exam") root.innerHTML = renderExam();
        else if (page === "result") root.innerHTML = renderResult();
        attachEvents();
      }

      // ── DEVICE TERKUNCI — HP lama mati/kuota habis, minta kode dari guru ──
      function renderDeviceLocked() {
        return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--bg)">
          <div style="max-width:420px;width:100%;background:#fff;border-radius:20px;padding:2rem 1.75rem;box-shadow:0 10px 40px rgba(0,0,0,.08);text-align:center">
            <div style="font-size:44px;margin-bottom:.5rem">🔒</div>
            <div style="font-size:18px;font-weight:700;color:var(--green);margin-bottom:.5rem">Perangkat Ini Belum Dikenali</div>
            <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1.5rem">
              Kemungkinan Anda biasa ujian di HP lain (HP lama mati/kuota habis?). Jawaban Anda
              <strong>tidak hilang</strong> — minta guru pengawas membuka akses untuk perangkat ini.
            </div>
            <div style="text-align:left;margin-bottom:1rem">
              <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px">Kode dari Guru</label>
              <input id="dl-code" placeholder="Contoh: 4F8K2X"
                style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;outline:none;box-sizing:border-box"
                onkeydown="if(event.key==='Enter')retryUnlock()" />
            </div>
            <button onclick="retryUnlock()" id="dl-submit-btn"
              style="width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">Masuk dengan Kode Ini</button>
            <div id="dl-err" style="display:none;color:var(--red2);font-size:12px;margin-top:.75rem"></div>
            <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:.5px solid var(--border)">
              <div style="font-size:12px;color:var(--muted);margin-bottom:.5rem">Atau tunjukkan kode/barcode tetap Anda ke guru:</div>
              <button class="logout-btn" style="background:var(--light);color:var(--green);width:100%" onclick="showMyCode()">🆔 Tampilkan Kode Saya</button>
            </div>
            <button class="logout-btn" style="margin-top:.75rem;width:100%" onclick="Auth.logout()">⏻ Keluar</button>
          </div>
        </div>`;
      }

      async function retryUnlock() {
        const input = document.getElementById("dl-code");
        const errEl = document.getElementById("dl-err");
        const code = (input?.value || "").trim();
        errEl.style.display = "none";
        if (!code) {
          errEl.textContent = "Masukkan kode dari guru dulu";
          errEl.style.display = "block";
          return;
        }
        const btn = document.getElementById("dl-submit-btn");
        btn.textContent = "Memeriksa..."; btn.disabled = true;
        try {
          await apiFetch("/api/student/register-device", {
            method: "POST",
            body: JSON.stringify({
              device_id: _myFingerprint,
              device_info: navigator.userAgent.substring(0, 250),
              transfer_code: code,
            }),
          });
          page = "loading";
          render();
          await loadExams();
          page = "list";
          render();
        } catch (err) {
          errEl.textContent = err.error || "Kode salah atau sudah kedaluwarsa";
          errEl.style.display = "block";
          btn.textContent = "Masuk dengan Kode Ini"; btn.disabled = false;
        }
      }

      // ── Kode/barcode tetap milik siswa — bisa dilihat kapan saja ──────
      async function showMyCode() {
        let modal = document.getElementById("_my-code-modal");
        if (!modal) {
          modal = document.createElement("div");
          modal.id = "_my-code-modal";
          modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem";
          modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
          document.body.appendChild(modal);
        }
        modal.innerHTML = `<div style="background:#fff;border-radius:20px;padding:1.75rem;max-width:320px;width:100%;text-align:center">
          <div style="font-weight:700;color:var(--green);margin-bottom:.75rem">🆔 Kode Saya</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:1rem">Tunjukkan ke guru pengawas — scan barcode atau bacakan kodenya untuk membuka device baru ini.</div>
          <div id="_my-code-body"><div class="spin" style="margin:1.5rem auto"></div></div>
          <button class="logout-btn" style="margin-top:1rem;width:100%" onclick="document.getElementById('_my-code-modal').remove()">Tutup</button>
        </div>`;
        try {
          const r = await apiFetch("/api/student/my-unlock-code");
          document.getElementById("_my-code-body").innerHTML = `
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(r.unlock_code)}" style="border-radius:10px;margin-bottom:.75rem" />
            <div style="font-size:22px;font-weight:800;letter-spacing:3px;color:var(--green)">${r.unlock_code}</div>
          `;
        } catch {
          document.getElementById("_my-code-body").innerHTML = '<div style="color:var(--red2);font-size:13px">Gagal memuat kode</div>';
        }
      }

      // ── LOADING ──────────────────────────────────────────────────
      function renderLoading(txt) {
        return `<div class="loading-page"><div class="spin"></div><div style="font-size:14px;color:var(--muted)">${txt}</div></div>`;
      }

      // ── LOGIN — redirect ke index.html ───────────────────────────
      function renderLogin() {
        // Langsung redirect, tidak perlu render halaman login
        window.location.href = "/index.html";
        return renderLoading("Mengalihkan...");
      }

      // ── DAFTAR UJIAN ─────────────────────────────────────────────
      function renderList() {
        const avail = exams.filter(
          (e) =>
            ["published", "ongoing"].includes(e.status) && !e.has_submitted,
        );
        const done = exams.filter((e) => e.has_submitted);
        const section = (title, items, emptyTxt) =>
          items.length
            ? `
    <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin-bottom:6px">${title}</div>
    ${items.map((e) => examItem(e)).join("")}
  `
            : emptyTxt
              ? `<div style="font-size:13px;color:var(--muted);text-align:center;padding:.75rem">${emptyTxt}</div>`
              : "";
        return `<div class="exam-list-page">
    <div class="list-header">
      <div class="user-chip">
        <div class="user-av">${(user?.name || "S")[0]}</div>
        <div><div class="user-name">${user?.name || "Siswa"}</div><div class="user-class">${user?.class_id?.replace(/_/g, " ").toUpperCase() || "Siswa"}</div></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="logout-btn" onclick="showMyCode()">🆔 Kode Saya</button>
        <button class="logout-btn" id="btn-logout">Keluar</button>
      </div>
    </div>
    <div class="list-body">
      <div class="list-welcome">
        <div class="list-welcome-name">Selamat datang, ${(user?.name || "Siswa").split(" ")[0]}! ✨</div>
        <div class="list-welcome-date">${new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
      </div>
      ${
        !exams.length
          ? `<div style="text-align:center;padding:4rem 1rem"><div style="font-size:48px;margin-bottom:.75rem">📭</div><div style="font-size:14px;color:var(--muted)">Belum ada ujian yang dijadwalkan untukmu</div></div>`
          : `
        ${section("TERSEDIA SEKARANG", avail)}
        ${avail.length === 0 ? `<div style="text-align:center;padding:3rem 1rem;background:#fff;border-radius:16px;margin-bottom:1rem"><div style="font-size:40px;margin-bottom:.75rem">✅</div><div style="font-size:14px;color:var(--muted)">Tidak ada ujian aktif saat ini</div></div>` : ""}
        ${section("SUDAH DIKERJAKAN", done)}
      `
      }
    </div>
  </div>`;
      }

      function examItem(e) {
        const done = e.has_submitted;
        return `<div class="exam-item ${done ? "" : "available"}" ${!done ? `data-start="${e.id}"` : ""}>
    <div class="exam-icon" style="background:${done ? "var(--light)" : e.status === "ongoing" ? "#eaf3de" : "#e6f1fb"}">${done ? "✅" : e.status === "ongoing" ? "🟢" : "📋"}</div>
    <div class="exam-info">
      <div class="exam-title">${e.title}</div>
      <div class="exam-meta">
        <span>📚 ${e.subject_name || "—"}</span>
        <span>⏱ ${e.duration_minutes} menit</span>
        <span>📅 ${e.start_at ? new Date(e.start_at).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" }) : "—"}</span>
      </div>
    </div>
    <div style="text-align:right">
      ${
        done
          ? `<span class="badge-done">Selesai</span>`
          : `<span class="badge-avail">Tersedia</span><br>
         <button class="start-btn" style="margin-top:6px" data-start="${e.id}">Mulai →</button>`
      }
    </div>
  </div>`;
      }

      // ── EXAM ─────────────────────────────────────────────────────
      function renderExam() {
        if (!sessionData) return renderLoading("Menyiapkan soal...");
        const qs = sessionData.questions,
          q = qs[current];
        const answered = Object.keys(answers).length,
          total = qs.length;
        const mm = String(Math.floor(timeLeft / 60)).padStart(2, "0"),
          ss = String(timeLeft % 60).padStart(2, "0");
        const timerCls =
          timeLeft > 300 ? "ok" : timeLeft > 60 ? "warn" : "danger";
        return `
    ${showViolation ? `<div class="violation-toast">⚠️ Jangan berpindah tab!<span class="viol-count">${violations}/5 peringatan</span></div>` : ""}
    ${showSubmit ? submitModal(answered, total) : ""}
    <div class="exam-page">
      <div class="exam-topbar">
        <div class="exam-topbar-title">${examData?.title || "Ujian"}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="timer ${timerCls}">${mm}:${ss}</div>
          <button onclick="document.documentElement.requestFullscreen?.()" style="background:var(--light);border:none;border-radius:8px;padding:6px 11px;font-size:12px;color:var(--muted);cursor:pointer">⛶</button>
        </div>
      </div>
      <div class="exam-body">
        <div class="q-area">
          <div class="q-progress-bar-wrap"><div class="q-progress-bar" style="width:${(answered / total) * 100}%"></div></div>
          <div class="q-progress-txt">${answered} dari ${total} soal terjawab</div>
          <div class="q-card">
            <div class="q-num-badge">Soal ${current + 1} dari ${total}</div>
            ${renderTypeChip(q)}
            ${q.attachment_url ? `<img src="${q.attachment_url}" style="max-width:100%;border-radius:10px;margin-bottom:1rem;cursor:zoom-in" onclick="event.stopPropagation();zoomImage('${q.attachment_url}')">` : ''}
            <div class="q-text">${q.content}</div>
            ${renderQuestionBody(q)}
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:.5rem">
            <button class="nav-btn nav-prev" id="btn-prev" ${current === 0 ? "disabled" : ""}>← Sebelumnya</button>
            ${
              current < total - 1
                ? `<button class="nav-btn nav-next" id="btn-next">Berikutnya →</button>`
                : `<button class="submit-main" id="btn-submit-main">Kumpulkan Ujian 🚀</button>`
            }
          </div>
        </div>
        <div class="q-nav-card">
          <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:.75rem;letter-spacing:.3px">NAVIGASI SOAL</div>
          <div class="q-dot-grid">
            ${qs.map((q2, i) => `<button class="q-dot ${i === current ? "current" : answers[q2.id] ? "answered" : "unanswered"}" data-goto="${i}">${i + 1}</button>`).join("")}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:1rem;text-align:center"><span style="font-weight:600;color:var(--green)">${answered}</span> / ${total} terjawab</div>
          ${violations > 0 ? `<div style="font-size:11px;color:var(--red);font-weight:600;text-align:center;margin-bottom:.75rem">⚠ ${violations} pelanggaran tab</div>` : ""}
          <button class="submit-main" id="btn-submit-nav" style="width:100%">🚀 Kumpulkan</button>
        </div>
      </div>
    </div>
  `;
      }

      function submitModal(answered, total) {
        return `<div class="modal-ov">
    <div class="modal-box">
      <div class="modal-icon">${answered < total ? "⚠️" : "✅"}</div>
      <div class="modal-title">${answered < total ? "Masih ada soal kosong" : "Kumpulkan Ujian?"}</div>
      <div class="modal-sub">${answered < total ? `Kamu baru menjawab ${answered} dari ${total} soal.` : "Pastikan semua jawaban sudah benar."}</div>
      <div class="modal-stats">
        <div class="modal-stat"><div class="modal-stat-num" style="color:var(--green3)">${answered}</div><div class="modal-stat-lbl">Terjawab</div></div>
        <div class="modal-stat"><div class="modal-stat-num" style="color:var(--red)">${total - answered}</div><div class="modal-stat-lbl">Kosong</div></div>
        <div class="modal-stat"><div class="modal-stat-num">${total}</div><div class="modal-stat-lbl">Total</div></div>
      </div>
      <div style="display:flex;gap:10px">
        <button style="flex:1;padding:11px;background:var(--light);border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit" id="btn-cancel-submit">Kembali</button>
        <button style="flex:1;padding:11px;background:${answered < total ? "var(--red)" : "var(--green)"};color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit" id="btn-confirm-submit">${submitting ? "Mengumpulkan..." : "Kumpulkan Sekarang"}</button>
      </div>
    </div>
  </div>`;
      }

      // ── Render soal berdasarkan tipe ────────────────────────────
      function renderTypeChip(q) {
        const labels = {
          camera_essay: '📷 Kamera+Uraian',
          yes_no:       '✅ Ya/Tidak',
          multiple_answer: '☑️ Jawaban Ganda',
          audio:        '🎵 Audio',
        };
        const lbl = labels[q.type];
        if (!lbl) return '';
        return `<div style="display:inline-block;font-size:11px;font-weight:600;color:#7c5e08;background:#fef9ec;border:1px solid #f5e6b2;border-radius:6px;padding:3px 9px;margin-bottom:10px">${lbl}</div>`;
      }

      function renderQuestionBody(q) {
        const type = q.type || 'multiple_choice';
        if (type === 'camera_essay')    return renderCameraEssay(q);
        if (type === 'yes_no')          return renderYesNo(q);
        if (type === 'audio')           return renderAudio(q);
        if (type === 'multiple_answer') return renderMultiAnswer(q);
        return renderOptions(q);
      }

      function renderOptions(q) {
        const labels = ['A','B','C','D','E'];
        return `<div class="options">${q.options.map((o, i) =>
          `<button class="opt-btn ${answers[q.id] === o.id ? 'selected' : ''}" data-qid="${q.id}" data-oid="${o.id}">
            <div class="opt-circle"></div>
            <div class="opt-label-box">${labels[i] || o.label}</div>
            ${o.image_url ? `<img src="${o.image_url}" style="max-width:140px;max-height:100px;border-radius:8px;object-fit:cover;margin-right:8px;cursor:zoom-in" onclick="event.stopPropagation();zoomImage('${o.image_url}')"/>` : ""}
            <div class="opt-text">${o.content || ""}</div>
          </button>`).join('')}</div>`;
      }

      function renderYesNo(q) {
        const yOpt = q.options.find(o => o.label === 'Ya'    || o.content?.toLowerCase() === 'ya')    || q.options[0];
        const nOpt = q.options.find(o => o.label === 'Tidak' || o.content?.toLowerCase() === 'tidak') || q.options[1];
        const selY = yOpt && answers[q.id] === yOpt.id;
        const selN = nOpt && answers[q.id] === nOpt.id;
        return `<div class="yes-no-wrap">
          <button class="yn-btn ${selY?'selected':''}" data-qid="${q.id}" data-oid="${yOpt?.id}">
            <span class="yn-emoji">✅</span><span>Ya</span>
          </button>
          <button class="yn-btn ${selN?'selected':''}" data-qid="${q.id}" data-oid="${nOpt?.id}">
            <span class="yn-emoji">❌</span><span>Tidak</span>
          </button>
        </div>`;
      }

      function renderAudio(q) {
        const src = q.audio_url || '';
        const labels = ['A','B','C','D','E'];
        return `
          <div class="audio-player-wrap">
            <button class="audio-play-btn" id="audio-play-btn" data-src="${src}">▶</button>
            <div>
              <div style="font-size:13px;font-weight:600;color:#1565c0">🎵 Audio Soal</div>
              <div id="audio-status" style="font-size:11px;color:#5c6bc0">Tekan play untuk mendengarkan</div>
            </div>
            <audio id="audio-el" src="${src}" style="display:none" preload="auto"></audio>
          </div>
          <div class="options">${q.options.map((o, i) =>
            `<button class="opt-btn ${answers[q.id] === o.id ? 'selected' : ''}" data-qid="${q.id}" data-oid="${o.id}">
              <div class="opt-circle"></div>
              <div class="opt-label-box">${labels[i] || o.label}</div>
              ${o.image_url ? `<img src="${o.image_url}" style="max-width:140px;max-height:100px;border-radius:8px;object-fit:cover;margin-right:8px;cursor:zoom-in" onclick="event.stopPropagation();zoomImage('${o.image_url}')"/>` : ""}
              <div class="opt-text">${o.content || ""}</div>
            </button>`).join('')}
          </div>`;
      }

      function renderMultiAnswer(q) {
        const sel = multiAnswers[q.id] || new Set();
        const labels = ['A','B','C','D','E'];
        const max = q.max_choices || 1;
        return `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">
            Pilih maksimal <b>${max}</b> jawaban (terpilih: ${sel.size}/${max})
          </div>
          <div class="options">${q.options.map((o, i) =>
          `<button class="opt-btn ${sel.has(o.id) ? 'multi-selected' : ''}" data-multi-qid="${q.id}" data-multi-oid="${o.id}">
            <div class="opt-checkbox"></div>
            <div class="opt-label-box">${labels[i] || o.label}</div>
            ${o.image_url ? `<img src="${o.image_url}" style="max-width:140px;max-height:100px;border-radius:8px;object-fit:cover;margin-right:8px;cursor:zoom-in" onclick="event.stopPropagation();zoomImage('${o.image_url}')"/>` : ""}
            <div class="opt-text">${o.content || ""}</div>
          </button>`).join('')}</div>`;
      }

      function renderCameraEssay(q) {
        const txt = essayTexts[q.id] || '';
        return `<div class="essay-wrap">
          <div class="essay-info">
            📱 Soal ini butuh foto jawaban di aplikasi HP.
            Jika mengerjakan lewat web, tulis jawaban/langkah penyelesaian di bawah ini — guru akan menilai secara manual.
          </div>
          <textarea class="essay-textarea" data-essay-qid="${q.id}"
            placeholder="Tuliskan jawaban atau langkah penyelesaian kamu di sini..."
            oninput="setEssayText('${q.id}', this.value)">${txt}</textarea>
          <div style="font-size:11px;color:var(--muted);text-align:right">${txt.length} karakter</div>
        </div>`;
      }

      // ── RESULT ───────────────────────────────────────────────────
      function renderResult() {
        const s = result?.score,
          cls = s >= 75 ? "excellent" : s >= 50 ? "good" : "poor";
        const label =
          s >= 75
            ? "Luar Biasa! 🎉"
            : s >= 50
              ? "Cukup Baik 👍"
              : "Perlu Belajar Lagi 💪";
        const scoreColor =
          s >= 75 ? "#1d9e75" : s >= 50 ? "#ef9f27" : "#e24b4a";
        const badgeCls =
          s >= 75 ? "badge-green" : s >= 50 ? "badge-yellow" : "badge-red";
        return `<div class="result-page">
    <div class="result-card">
      <div class="result-icon">${s >= 75 ? "🏆" : s >= 50 ? "👍" : "📚"}</div>
      <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--text)">Ujian Selesai!</div>
      <div style="font-size:14px;color:var(--muted);margin:.25rem 0 1.25rem">${examData?.title || ""}</div>
      ${
        s != null
          ? `
        <div class="result-score" style="color:${scoreColor}">${s.toFixed(1)}</div>
        <span class="badge ${badgeCls}" style="font-size:13px;padding:5px 14px;margin-bottom:1.25rem">${label}</span>
        <div class="modal-stats">
          <div class="modal-stat"><div class="modal-stat-num" style="color:var(--green3)">${result.correct_count ?? "—"}</div><div class="modal-stat-lbl">Benar</div></div>
          <div class="modal-stat"><div class="modal-stat-num" style="color:var(--red)">${result.wrong_count ?? "—"}</div><div class="modal-stat-lbl">Salah</div></div>
          <div class="modal-stat"><div class="modal-stat-num" style="color:var(--muted)">${result.empty_count ?? "—"}</div><div class="modal-stat-lbl">Kosong</div></div>
        </div>
      `
          : `<div style="font-size:14px;color:var(--muted);margin:1rem 0 1.5rem">Jawaban berhasil dikumpulkan. Nilai akan diumumkan guru.</div>`
      }
      <button id="btn-home" style="width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s">← Kembali ke Daftar Ujian</button>
    </div>
  </div>`;
      }

      // ── Events ───────────────────────────────────────────────────
      function attachEvents() {
        document
          .getElementById("btn-logout")
          ?.addEventListener("click", logout);
        // Exam start
        document.querySelectorAll("[data-start]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            startExam(el.dataset.start);
          }),
        );
        // Pilihan ganda, ya/tidak
        document.querySelectorAll(".opt-btn[data-qid], .yn-btn[data-qid]").forEach((btn) =>
          btn.addEventListener("click", () => selectAnswer(btn.dataset.qid, btn.dataset.oid)));
        // Jawaban ganda (multi)
        document.querySelectorAll(".opt-btn[data-multi-qid]").forEach((btn) =>
          btn.addEventListener("click", () => selectMulti(btn.dataset.multiQid, btn.dataset.multiOid)));
        // Audio player
        const audioBtn = document.getElementById('audio-play-btn');
        const audioEl  = document.getElementById('audio-el');
        if (audioBtn && audioEl) {
          audioBtn.addEventListener('click', () => {
            if (audioEl.paused) {
              audioEl.play();
              audioBtn.textContent = '⏸';
              document.getElementById('audio-status').textContent = 'Sedang diputar...';
            } else {
              audioEl.pause();
              audioBtn.textContent = '▶';
              document.getElementById('audio-status').textContent = 'Dijeda';
            }
          });
          audioEl.addEventListener('ended', () => {
            audioBtn.textContent = '▶';
            document.getElementById('audio-status').textContent = 'Selesai diputar';
          });
        }
        // Nav
        document.getElementById("btn-prev")?.addEventListener("click", () => {
          current--;
          render();
        });
        document.getElementById("btn-next")?.addEventListener("click", () => {
          current++;
          render();
        });
        document.querySelectorAll(".q-dot").forEach((d) =>
          d.addEventListener("click", () => {
            current = parseInt(d.dataset.goto);
            render();
          }),
        );
        // Submit
        document
          .getElementById("btn-submit-main")
          ?.addEventListener("click", () => {
            showSubmit = true;
            render();
          });
        document
          .getElementById("btn-submit-nav")
          ?.addEventListener("click", () => {
            showSubmit = true;
            render();
          });
        document
          .getElementById("btn-cancel-submit")
          ?.addEventListener("click", () => {
            showSubmit = false;
            render();
          });
        document
          .getElementById("btn-confirm-submit")
          ?.addEventListener("click", () => submitExam());
        // Result
        document
          .getElementById("btn-home")
          ?.addEventListener("click", () => backToList());
      }

      // ── Logic ─────────────────────────────────────────────────────
      function logout() {
        localStorage.removeItem("siswa_token");
        localStorage.removeItem("ujian_token");
        localStorage.removeItem("ujian_user");
        _token = "";
        user = null;
        window.location.href = "/index.html";
      }

      async function loadExams() {
        try {
          exams = await apiFetch("/api/student/exams");
        } catch {
          exams = [];
        }
      }

      async function startExam(id) {
        document.getElementById("root").innerHTML =
          renderLoading("Menyiapkan soal...");
        try {
          const sess = await apiFetch(`/api/student/exams/${id}/start`, {
            method: "POST",
            body: JSON.stringify({ device_key: deviceKey() }),
          });
          examData = exams.find((e) => e.id === id);
          sessionData = sess;
          answers = sess.saved_answers || {};
          essayTexts = {};
          multiAnswers = {};
          // Restore essay texts dari pertanyaan yang sudah ada data
          (sess.questions || []).forEach(q => {
            if (q.essay_text) {
              essayTexts[q.id] = q.essay_text;
              answers[q.id] = 'essay';
            }
            if (q.saved_option_ids && Array.isArray(q.saved_option_ids) && q.saved_option_ids.length) {
              multiAnswers[q.id] = new Set(q.saved_option_ids);
              answers[q.id] = 'multi';
            }
          });
          timeLeft =
            sess.remaining_seconds || examData?.duration_minutes * 60 || 5400;
          page = "exam";
          current = 0;
          violations = 0;
          showViolation = false;
          showSubmit = false;
          render();
          startTimer();
          startAutoSave();
          startAntiCheat();
        } catch (e) {
          alert(e.error || "Gagal memulai ujian");
          page = "list";
          render();
        }
      }

      function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitExam(true);
            return;
          }
          // Update timer saja tanpa full re-render
          const el = document.querySelector(".timer");
          if (el) {
            const mm = String(Math.floor(timeLeft / 60)).padStart(2, "0"),
              ss = String(timeLeft % 60).padStart(2, "0");
            el.textContent = `${mm}:${ss}`;
            el.className = `timer ${timeLeft > 300 ? "ok" : timeLeft > 60 ? "warn" : "danger"}`;
          }
        }, 1000);
      }

      // Jawaban yang BELUM dikonfirmasi tersimpan ke server (baru diklik tapi
      // request masih jalan / gagal karena offline). Setiap klik sudah langsung
      // dikirim saat itu juga — syncAllAnswers() di bawah HANYA me-retry yang
      // gagal, bukan mengirim ulang SEMUA jawaban tiap 30 detik (dulu begini,
      // boros: untuk 1000 siswa x banyak soal jadi puluhan ribu request sia-sia
      // setiap 30 detik walau jawabannya sudah berhasil tersimpan).
      let pendingSync = new Set();

      function syncAllAnswers() {
        if (!sessionData || !pendingSync.size) return;
        const sid = sessionData.session_id;
        [...pendingSync].forEach((qid) => {
          const oid = answers[qid];
          if (!oid) {
            pendingSync.delete(qid); // jawaban sudah dihapus, tidak perlu sync
            return;
          }
          if (oid === 'essay') {
            const text = essayTexts[qid] || '';
            apiFetch(`/api/student/sessions/${sid}/answer-essay`, {
              method: "POST",
              body: JSON.stringify({ question_id: qid, essay_text: text, photo_b64: '' }),
            }).then(() => pendingSync.delete(qid)).catch(() => {});
          } else if (oid === 'multi') {
            const opts = multiAnswers[qid] ? [...multiAnswers[qid]] : [];
            apiFetch(`/api/student/sessions/${sid}/answer-multi`, {
              method: "POST",
              body: JSON.stringify({ question_id: qid, option_ids: opts }),
            }).then(() => pendingSync.delete(qid)).catch(() => {});
          } else {
            apiFetch(`/api/student/sessions/${sid}/answer`, {
              method: "POST",
              body: JSON.stringify({ question_id: qid, option_id: oid }),
            }).then(() => pendingSync.delete(qid)).catch(() => {});
          }
        });
      }

      function startAutoSave() {
        clearInterval(saveInterval);
        saveInterval = setInterval(() => {
          if (!navigator.onLine) return;
          syncAllAnswers();
        }, 30000);
      }

      // ── Offline Detection (Opsi 1: pause otomatis) ───────────
      let _offlineBanner = null;
      function _showOfflineBanner() {
        if (_offlineBanner) return;
        _offlineBanner = document.createElement('div');
        _offlineBanner.id = '_offline_banner';
        _offlineBanner.style.cssText = `
          position:fixed;top:0;left:0;right:0;z-index:9999;
          background:#b45309;color:#fff;text-align:center;
          padding:10px 16px;font-size:13px;font-weight:600;
          display:flex;align-items:center;justify-content:center;gap:8px;
        `;
        _offlineBanner.innerHTML = `
          <span>📡</span>
          <span>Koneksi terputus — jawaban tersimpan lokal. Timer tetap berjalan. Segera sambungkan kembali.</span>
        `;
        document.body.prepend(_offlineBanner);
      }
      function _hideOfflineBanner() {
        if (_offlineBanner) { _offlineBanner.remove(); _offlineBanner = null; }
      }

      window.addEventListener('offline', () => {
        if (page === 'exam') _showOfflineBanner();
      });
      window.addEventListener('online', () => {
        _hideOfflineBanner();
        if (page === 'exam' && sessionData) syncAllAnswers();
      });

      function startAntiCheat() {
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            violations++;
            apiFetch(
              `/api/student/sessions/${sessionData.session_id}/violation`,
              { method: "POST" },
            ).catch(() => {});
            showViolation = true;
            render();
            setTimeout(() => {
              showViolation = false;
              render();
            }, 4000);
            if (violations >= 5) submitExam(true);
          }
        });
        document.addEventListener("contextmenu", (e) => e.preventDefault());
        document.addEventListener("keydown", (e) => {
          if (
            e.ctrlKey &&
            ["c", "v", "a", "p", "s"].includes(e.key.toLowerCase())
          )
            e.preventDefault();
        });
      }

      function selectAnswer(qid, oid) {
        answers[qid] = oid;
        pendingSync.add(qid);
        apiFetch(`/api/student/sessions/${sessionData.session_id}/answer`, {
          method: "POST",
          body: JSON.stringify({ question_id: qid, option_id: oid }),
        }).then(() => pendingSync.delete(qid)).catch(() => {});
        render();
      }

      function selectMulti(qid, oid) {
        const q = sessionData.questions.find(qq => qq.id === qid);
        const max = (q && q.max_choices) || 1;
        if (!multiAnswers[qid]) multiAnswers[qid] = new Set();
        if (multiAnswers[qid].has(oid)) {
          multiAnswers[qid].delete(oid);
        } else {
          if (multiAnswers[qid].size >= max) {
            UI.toast(`Maksimal hanya bisa memilih ${max} jawaban`, "error");
            return;
          }
          multiAnswers[qid].add(oid);
        }
        if (multiAnswers[qid].size > 0) answers[qid] = 'multi';
        else                            delete answers[qid];
        pendingSync.add(qid);
        apiFetch(`/api/student/sessions/${sessionData.session_id}/answer-multi`, {
          method: "POST",
          body: JSON.stringify({ question_id: qid, option_ids: [...multiAnswers[qid]] }),
        }).then(() => pendingSync.delete(qid)).catch(() => {});
        render();
      }

      let _essayTimer = {};
      function setEssayText(qid, text) {
        essayTexts[qid] = text;
        if (text.trim()) answers[qid] = 'essay';
        else             delete answers[qid];
        // Update karakter count tanpa re-render penuh
        const charEl = document.querySelector(`[data-essay-qid="${qid}"]`)
          ?.closest('.essay-wrap')?.querySelector('div:last-child');
        if (charEl) charEl.textContent = text.length + ' karakter';
        // Debounce save 1 detik
        pendingSync.add(qid);
        clearTimeout(_essayTimer[qid]);
        _essayTimer[qid] = setTimeout(() => {
          apiFetch(`/api/student/sessions/${sessionData.session_id}/answer-essay`, {
            method: "POST",
            body: JSON.stringify({ question_id: qid, essay_text: text, photo_b64: '' }),
          }).then(() => pendingSync.delete(qid)).catch(() => {});
        }, 1000);
        // Update progress bar dan navigasi soal tanpa full render
        const prog = document.querySelector('.q-progress-bar');
        const txt  = document.querySelector('.q-progress-txt');
        const ans  = Object.keys(answers).length;
        const tot  = sessionData.questions.length;
        if (prog) prog.style.width = `${(ans/tot)*100}%`;
        if (txt)  txt.textContent  = `${ans} dari ${tot} soal terjawab`;
      }

      async function submitExam(auto = false) {
        if (submitting) return;
        submitting = true;
        showSubmit = false;
        clearInterval(timerInterval);
        clearInterval(saveInterval);
        try {
          result = await apiFetch(
            `/api/student/sessions/${sessionData.session_id}/submit`,
            {
              method: "POST",
              body: JSON.stringify({ auto_submit: auto }),
            },
          );
          page = "result";
          render();
        } catch {
          page = "result";
          result = { score: null };
          render();
        } finally {
          submitting = false;
        }
      }

      async function backToList() {
        page = "list";
        await loadExams();
        render();
      }
      function deviceKey() {
        const k = "ujian_dk";
        if (!localStorage.getItem(k))
          localStorage.setItem(
            k,
            Math.random().toString(36).substr(2, 16) + Date.now().toString(36),
          );
        return localStorage.getItem(k);
      }

      // ── Init ─────────────────────────────────────────────────────
      (async () => {
        // Ambil token dari URL
        const params = new URLSearchParams(location.search);
        const urlToken = params.get("token");
        function _deviceFingerprint() {
          const raw = [
            navigator.userAgent,
            navigator.language,
            screen.width + 'x' + screen.height,
            new Date().getTimezoneOffset(),
            navigator.hardwareConcurrency || 0,
          ].join('|');
          let h = 0;
          for (let i = 0; i < raw.length; i++) { h = Math.imul(31, h) + raw.charCodeAt(i) | 0; }
          return 'dev_' + Math.abs(h).toString(36);
        }

        if (urlToken) {
          setToken(urlToken);
          window.history.replaceState({}, "", location.pathname);
        }

        if (_token) {
          try {
            user = await apiFetch("/api/auth/me");
            if (user.role !== "siswa") {
              const dest =
                {
                  admin: "/pages/admin-dashboard.html",
                  guru: "/pages/guru-dashboard.html",
                }[user.role] || "/index.html";
              window.location.replace(dest);
              return;
            }
            localStorage.setItem("ujian_user", JSON.stringify(user));

            // Daftarkan device otomatis saat login
            _myFingerprint = _deviceFingerprint();
            try {
              await apiFetch("/api/student/register-device", {
                method: "POST",
                body: JSON.stringify({
                  device_id: _myFingerprint,
                  device_info: navigator.userAgent.substring(0, 250),
                }),
              });
            } catch (err) {
              // Device baru tidak dikenali — tampilkan layar minta kode dari
              // guru, jangan diam-diam diteruskan (dulu begini, bikin siswa
              // bingung kalau ternyata device-nya memang belum dibuka).
              page = "device-locked";
              render();
              return;
            }

            await loadExams();
            page = "list";
          } catch {
            // Token tidak valid — bersihkan dan redirect ke login
            localStorage.removeItem("siswa_token");
            localStorage.removeItem("ujian_token");
            localStorage.removeItem("ujian_user");
            window.location.replace("/index.html");
            return;
          }
        } else {
          // Belum login
          window.location.replace("/index.html");
          return;
        }
        render();
      })();
    </script>
  </body>
