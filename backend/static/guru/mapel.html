      <div class="main-wrap">
        <div class="topbar">
          <div class="topbar-title">Mata Pelajaran</div>
          <div class="topbar-right">
            <button class="btn btn-primary" onclick="openModal()">
              + Tambah Mapel
            </button>
          </div>
        </div>

        <div class="page-main">
          <div class="card" style="padding: 0; overflow: hidden">
            <div
              style="
                padding: 0.875rem 1.25rem;
                border-bottom: 0.5px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
              "
            >
              <div style="font-weight: 600; font-size: 14px">
                Daftar Mata Pelajaran (<span id="mapel-count">0</span>)
              </div>
              <input
                type="text"
                id="search-mapel"
                placeholder="Cari mapel..."
                oninput="filterMapel()"
                style="
                  padding: 7px 12px;
                  border: 1px solid var(--border2);
                  border-radius: 8px;
                  font-size: 13px;
                  width: 200px;
                "
              />
            </div>
            <div id="mapel-list">
              <div style="padding: 3rem; text-align: center">
                <div class="loading-spinner"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal tambah/edit -->
    <div
      id="modal-mapel"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        backdrop-filter: blur(4px);
      "
    >
      <div
        style="
          background: #fff;
          border-radius: 18px;
          padding: 2rem;
          max-width: 400px;
          width: 100%;
        "
      >
        <div
          style="
            font-weight: 700;
            font-size: 18px;
            color: var(--green);
            margin-bottom: 1.25rem;
          "
          id="modal-title"
        >
          Tambah Mata Pelajaran
        </div>
        <div class="form-group">
          <label>Nama Mata Pelajaran</label>
          <input
            class="form-control"
            id="f-name"
            placeholder="Contoh: Matematika, Fisika..."
          />
        </div>
        <div style="display: flex; gap: 10px; margin-top: 1rem">
          <button
            class="btn btn-secondary"
            onclick="closeModal()"
            style="flex: 1"
          >
            Batal
          </button>
          <button
            class="btn btn-primary"
            onclick="saveMapel()"
            style="flex: 1"
            id="f-submit"
          >
            Simpan
          </button>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      if (!Auth.requireRole(["guru", "admin"])) throw new Error();
      UI.initSidebar();

      let allMapel = [],
        editingId = null;

      async function load() {
        try {
          const res = await API.get("/api/subjects");
          // handle array atau {subjects:[]}
          const all = Array.isArray(res) ? res : (res.subjects || []);
          const user = Auth.getUser();
          // Filter hanya mapel milik guru ini (teacher_id === user.id) atau yang memang global (null)
          // Tampilkan semua tapi tandai mana yang "milikmu"
          allMapel = all;
          document.getElementById("mapel-count").textContent = allMapel.length;
          renderMapel(allMapel);
        } catch {
          UI.toast("Gagal memuat mapel", "error");
        }
      }

      function filterMapel() {
        const q = document.getElementById("search-mapel").value.toLowerCase();
        renderMapel(
          q
            ? allMapel.filter((m) => m.name.toLowerCase().includes(q))
            : allMapel,
        );
      }

      function renderMapel(data) {
        const el = document.getElementById("mapel-list");
        if (!data.length) {
          el.innerHTML =
            '<div class="empty-state" style="padding:3rem"><div class="empty-icon">📚</div><div class="empty-text">Belum ada mata pelajaran</div></div>';
          return;
        }
        el.innerHTML = data
          .map(
            (m, i) => `
    <div style="display:flex;align-items:center;gap:12px;padding:.875rem 1.25rem;border-bottom:.5px solid #f0ede5;${i % 2 === 0 ? "" : " background:#fafaf8"}">
      <div style="width:36px;height:36px;background:var(--green4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📚</div>
      <div style="flex:1;font-weight:500">${m.name}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="openModal(${JSON.stringify(m).replace(/"/g, "&quot;")})">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMapel('${m.id}','${m.name.replace(/'/g, "\\'")}')">🗑 Hapus</button>
      </div>
    </div>
  `,
          )
          .join("");
      }

      function openModal(mapel = null) {
        editingId = mapel?.id || null;
        document.getElementById("modal-title").textContent = mapel
          ? "Edit Mata Pelajaran"
          : "Tambah Mata Pelajaran";
        document.getElementById("f-name").value = mapel?.name || "";
        document.getElementById("f-submit").textContent = mapel
          ? "Simpan Perubahan"
          : "Tambah";
        document.getElementById("modal-mapel").style.display = "flex";
        setTimeout(() => document.getElementById("f-name").focus(), 100);
      }
      function closeModal() {
        document.getElementById("modal-mapel").style.display = "none";
      }

      async function saveMapel() {
        const name = document.getElementById("f-name").value.trim();
        if (!name) {
          UI.toast("Nama mapel wajib diisi", "warn");
          return;
        }
        const btn = document.getElementById("f-submit");
        btn.textContent = "Menyimpan...";
        btn.disabled = true;
        try {
          if (editingId) {
            await API.patch(`/api/subjects/${editingId}`, { name });
            UI.toast("✅ Mapel diperbarui", "success");
          } else {
            await API.post("/api/subjects", { name });
            UI.toast("✅ Mapel ditambahkan", "success");
          }
          closeModal();
          load();
        } catch (e) {
          UI.toast(e.error || "Gagal menyimpan", "error");
        } finally {
          btn.textContent = editingId ? "Simpan Perubahan" : "Tambah";
          btn.disabled = false;
        }
      }

      async function deleteMapel(id, name) {
        UI.confirm(
          "Hapus Mapel",
          `Hapus mata pelajaran "<strong>${name}</strong>"?`,
          async () => {
            try {
              await API.del(`/api/subjects/${id}`);
              UI.toast("Mapel dihapus", "success");
              load();
            } catch (e) {
              UI.toast(e.error || "Gagal menghapus", "error");
            }
          },
        );
      }

      // Enter untuk submit
      document.addEventListener("keydown", (e) => {
        if (
          e.key === "Enter" &&
          document.getElementById("modal-mapel").style.display === "flex"
        )
          saveMapel();
      });

      load();
    </script>
  </body>
