<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Nilai & Rekap — Ujian Online</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      /* Card siswa personal */
      .stu-card {
        background: #fff;
        border: 0.5px solid var(--border);
        border-radius: 16px;
        padding: 1rem 1.25rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .stu-card:hover {
        border-color: var(--green3);
        box-shadow: 0 4px 20px rgba(15, 76, 53, 0.1);
        transform: translateY(-2px);
      }
      .stu-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
        position: relative;
      }
      .stu-badge {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid #fff;
        font-size: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .score-ring {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
      }
      .progress-bar-thin {
        height: 6px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
        margin-top: 4px;
      }
      .progress-bar-fill {
        height: 100%;
        border-radius: 99px;
        transition: width 0.6s ease;
      }
      /* Distribusi bubble */
      .grade-bubble {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-weight: 800;
      }
      /* Detail panel */
      .modal-detail {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 200;
        align-items: flex-start;
        justify-content: flex-end;
        backdrop-filter: blur(3px);
      }
      .modal-detail.show {
        display: flex;
      }
      .detail-panel {
        background: #fff;
        width: 500px;
        height: 100vh;
        overflow-y: auto;
        box-shadow: -10px 0 50px rgba(0, 0, 0, 0.15);
      }
      .detail-hero {
        background: linear-gradient(145deg, #0a3323, #0f4c35, #1a6b4a);
        padding: 1.75rem;
        position: relative;
        overflow: hidden;
      }
      .detail-hero::before {
        content: "";
        position: absolute;
        top: -60px;
        right: -60px;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
      }
      .q-item {
        padding: 1rem 1.25rem;
        border-bottom: 0.5px solid #f0ede5;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .q-item:last-child {
        border-bottom: none;
      }
      .q-status {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .q-status.correct {
        background: #eaf3de;
      }
      .q-status.wrong {
        background: #fcebeb;
      }
      .q-status.empty {
        background: var(--light);
      }
      .ans-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 6px;
      }
      .ans-pill.correct {
        background: #eaf3de;
        color: #3b6d11;
      }
      .ans-pill.wrong {
        background: #fcebeb;
        color: var(--red2);
      }
      .ans-pill.empty {
        background: var(--light);
        color: var(--muted);
      }
      .correct-ans {
        font-size: 11px;
        color: var(--green3);
        margin-top: 4px;
        font-weight: 500;
      }
      /* Rank badge */
      .rank-1 {
        background: linear-gradient(135deg, #ffd700, #ffa500);
        color: #fff;
      }
      .rank-2 {
        background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
        color: #fff;
      }
      .rank-3 {
        background: linear-gradient(135deg, #cd7f32, #b8600b);
        color: #fff;
      }
    </style>
  </head>

      <div class="main-wrap">
        <div class="topbar">
          <div class="topbar-title">Nilai & Rekap</div>

        <div class="page-main">
          <div class="card">
            <select

              <option value="">— Pilih ujian —</option>
            </select>

          <div id="nilai-content" style="display: none">
            <!-- Hero summary -->

              style="
                background: linear-gradient(135deg, #0a3323, #0f4c35, #1a6b4a);
                border-radius: 18px;
                padding: 1.5rem 2rem;
                margin-bottom: 1rem;
                display: flex;
                align-items: center;
                gap: 2rem;
                flex-wrap: wrap;
              "
            >
              <div>
                <div
                  id="exam-title-hero"
                  style="font-size: 20px; font-weight: 700; color: #fff"
                ></div>
                <div
                  id="exam-sub-hero"
                  style="
                    font-size: 13px;
                    color: rgba(255, 255, 255, 0.55);
                    margin-top: 3px;
                  "
                ></div>
              </div>
              <div style="display: flex; gap: 1.5rem; flex-wrap: wrap">
                <div style="text-align: center">
                  <div
                    id="h-total"
                    style="font-size: 32px; font-weight: 800; color: #fff"
                  >
                    —
                  </div>
                  <div style="font-size: 11px; color: rgba(255, 255, 255, 0.5)">
                    Peserta
                  </div>
                </div>
                <div style="text-align: center">
                  <div
                    id="h-avg"
                    style="font-size: 32px; font-weight: 800; color: #4ade80"
                  >
                    —
                  </div>
                  <div style="font-size: 11px; color: rgba(255, 255, 255, 0.5)">
                    Rata-rata
                  </div>
                </div>
                <div style="text-align: center">
                  <div
                    id="h-pass"
                    style="font-size: 32px; font-weight: 800; color: #facc15"
                  >
                    —
                  </div>
                  <div style="font-size: 11px; color: rgba(255, 255, 255, 0.5)">
                    Lulus
                  </div>
                </div>
                <div style="text-align: center">
                  <div
                    id="h-top"
                    style="font-size: 32px; font-weight: 800; color: #60a5fa"
                  >
                    —
                  </div>
                  <div style="font-size: 11px; color: rgba(255, 255, 255, 0.5)">
                    Tertinggi
                  </div>
                </div>

                display: grid;
                grid-template-columns: auto 1fr;
                gap: 1rem;
                margin-bottom: 1rem;

                <div

                    font-size: 13px;
                    font-weight: 600;

                    letter-spacing: 0.3px;

                  SEBARAN NILAI

              JAWABAN PER SOAL

    <script src="../config.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/auth.js"></script>
    <script src="../components/common.js"></script>
    <script>
      if (!Auth.requireRole(["guru", "admin"])) throw new Error();
      UI.initSidebar();

      let nilaiData = [],
        currentExamId = null,
        currentExamTitle = '',
        monitorData = null;
      const COLORS = [
        "#0f4c35",
        "#1a6b4a",
        "#185fa5",
        "#854f0b",
        "#a32d2d",
        "#5b2d8e",
        "#0e6b6b",
        "#6b3d0e",
      ];
      const getColor = (n) => COLORS[n.charCodeAt(0) % COLORS.length];

      async function init() {
        const exams = await API.get("/api/exams");
        const sel = document.getElementById("exam-select");
        sel.innerHTML =
          '<option value="">— Pilih ujian —</option>' +
          exams
            .map(
              (e) =>
                `<option value="${e.id}">${e.title} — ${e.status}</option>`,
            )
            .join("");
        const id = new URLSearchParams(location.search).get("id");
        if (id) {
          sel.value = id;
          loadNilai(id);
        }
      }

      async function loadNilai(examId) {
        if (!examId) {
          document.getElementById("nilai-content").style.display = "none";
          return;
        }
        currentExamId = examId;
        // Simpan judul ujian dari option yang terpilih
        const sel = document.getElementById('exam-select');
        const selText = sel ? sel.options[sel.selectedIndex]?.text || '' : '';
        currentExamTitle = selText.split(' — ')[0].trim();
        UI.loading(true, "Memuat...");
        try {
          const [r, mon] = await Promise.all([
            API.get(`/api/exams/${examId}/results`),
            API.get(`/api/exams/${examId}/monitor`).catch(() => null),
          ]);
          nilaiData = r.results || [];
          monitorData = mon;
          document.getElementById("nilai-content").style.display = "block";
          document.getElementById("export-wrap").style.display = "flex";
          renderHero(r);
          renderGradeBubbles(r.score_distribution || {});
          renderHardSoal(r.question_stats || []);
          renderCards(nilaiData);
          // Filter kelas
          const kelas = [
            ...new Set(nilaiData.map((s) => s.class_name).filter(Boolean)),
          ].sort();
          document.getElementById("filter-kelas").innerHTML =
            '<option value="">Semua Kelas</option>' +
            kelas.map((k) => `<option>${k}</option>`).join("");
        } catch (e) {
          UI.toast("Gagal memuat nilai", "error");
        } finally {
          UI.loading(false);
        }
      }

      function renderHero(r) {
        const s = r.summary || {};
        const scores = nilaiData
          .filter((x) => x.score != null)
          .map((x) => parseFloat(x.score));
        const top = scores.length ? Math.max(...scores).toFixed(1) : "—";
        document.getElementById("h-total").textContent = s.total_students || 0;
        document.getElementById("h-avg").textContent =
          s.avg_score != null ? s.avg_score.toFixed(1) : "—";
        document.getElementById("h-pass").textContent =
          (s.submitted || 0) + " submit";
        document.getElementById("h-top").textContent = top;
        document.getElementById("exam-title-hero").textContent =
          monitorData?.exam?.title || "";
        document.getElementById("exam-sub-hero").textContent =
          `${s.submitted || 0} dari ${s.total_students || 0} siswa sudah mengumpulkan`;
      }

      function renderGradeBubbles(dist) {
        const grades = [
          {
            label: "A",
            range: "90–100",
            key: "a",
            bg: "linear-gradient(135deg,#1d9e75,#0f6e56)",
            count: dist.a || 0,
          },
          {
            label: "B",
            range: "75–89",
            key: "b",
            bg: "linear-gradient(135deg,#378add,#1565c0)",
            count: dist.b || 0,
          },
          {
            label: "C",
            range: "60–74",
            key: "c",
            bg: "linear-gradient(135deg,#ef9f27,#c07d00)",
            count: dist.c || 0,
          },
          {
            label: "D",
            range: "<60",
            key: "d",
            bg: "linear-gradient(135deg,#e24b4a,#b71c1c)",
            count: dist.d || 0,
          },
        ];
        document.getElementById("grade-bubbles").innerHTML = grades
          .map(
            (g) => `
    <div style="text-align:center">
      <div class="grade-bubble" style="background:${g.bg};color:#fff;margin:0 auto 6px">
        <div style="font-size:20px;font-weight:800">${g.count}</div>
        <div style="font-size:9px;opacity:.8">siswa</div>
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--text)">${g.label}</div>
      <div style="font-size:11px;color:var(--muted)">${g.range}</div>
    </div>
  `,
          )
          .join("");
      }

      function renderHardSoal(stats) {
        const hard = stats
          .map((s, i) => ({ ...s, no: i + 1 }))
          .sort((a, b) => a.pct - b.pct)
          .slice(0, 4);
        document.getElementById("hard-soal").innerHTML = hard
          .map((s) => {
            const color =
              s.pct >= 75
                ? "var(--green3)"
                : s.pct >= 50
                  ? "var(--amber)"
                  : "var(--red)";
            const label =
              s.pct >= 75 ? "😊 Mudah" : s.pct >= 50 ? "😐 Sedang" : "😰 Sulit";
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="font-size:12px;color:var(--muted);width:44px;flex-shrink:0">Soal ${s.no}</div>
      <div style="flex:1"><div class="progress-bar-thin"><div class="progress-bar-fill" style="width:${s.pct}%;background:${color}"></div></div></div>
      <div style="font-size:12px;font-weight:600;color:${color};width:36px">${s.pct}%</div>
      <div style="font-size:11px;color:var(--muted);width:60px">${label}</div>
    </div>`;
          })
          .join("");
      }

      function filterTable() {
        const kelas = document.getElementById("filter-kelas").value;
        const status = document.getElementById("filter-status").value;
        const q = document.getElementById("search-stu").value.toLowerCase();
        let filtered = nilaiData.filter(
          (s) =>
            (!kelas || s.class_name === kelas) &&
            (!q || s.name.toLowerCase().includes(q)) &&
            (!status ||
              (status === "submit" ? s.submitted_at : !s.submitted_at)),
        );
        renderCards(filtered);
      }

      function renderCards(data) {
        document.getElementById("count-label").textContent =
          `${data.length} siswa`;
        const el = document.getElementById("stu-cards");
        if (!data.length) {
          el.innerHTML =
            '<div class="card"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Tidak ada data</div></div></div>';
          return;
        }
        // Sort by score desc
        const sorted = [...data].sort(
          (a, b) => (b.score ?? -1) - (a.score ?? -1),
        );
        el.innerHTML = sorted
          .map((s, i) => {
            const score = s.score != null ? parseFloat(s.score) : null;
            const pct = score != null ? (score / 100) * 100 : 0;
            const color =
              score == null
                ? "var(--muted)"
                : score >= 90
                  ? "#1d9e75"
                  : score >= 75
                    ? "#378add"
                    : score >= 60
                      ? "#ef9f27"
                      : "#e24b4a";
            const grade =
              score == null
                ? "—"
                : score >= 90
                  ? "A"
                  : score >= 75
                    ? "B"
                    : score >= 60
                      ? "C"
                      : "D";
            const rankBadge =
              i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";
            const bgColor = getColor(s.name || "X");
            return `<div class="stu-card" onclick="showDetail('${s.student_id || s.id}')">
      <!-- Avatar -->
      <div style="position:relative">
        <div class="stu-avatar" style="background:${bgColor};font-size:${s.name?.length > 6 ? "14px" : "18px"}">${(s.name || "?")[0]}</div>
        ${rankBadge ? `<div style="position:absolute;top:-6px;right:-6px;font-size:16px">${rankBadge}</div>` : ""}
        ${s.tab_violations > 0 ? `<div class="stu-badge" style="background:var(--red)">⚠</div>` : ""}
      </div>
      <!-- Info -->
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:15px">${s.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:1px">${s.class_name || "—"} · ${s.submitted_at ? "Submit " + UI.fmtTime(s.submitted_at) : "Belum submit"}</div>
        <!-- Progress bar jawaban benar -->
        ${
          score != null
            ? `
          <div class="progress-bar-thin" style="margin-top:6px;width:160px">
            <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">
            ${s.correct_count ?? 0} benar · ${s.wrong_count ?? 0} salah · ${s.empty_count ?? 0} kosong
          </div>
        `
            : '<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">Belum mengumpulkan jawaban</div>'
        }
      </div>
      <!-- Nilai bulat besar -->
      <div style="text-align:center;min-width:70px">
        <div style="font-size:32px;font-weight:800;color:${color};line-height:1">${score != null ? score.toFixed(1) : "—"}</div>
        <div style="font-size:12px;font-weight:700;color:${color};margin-top:2px">${grade}</div>
        ${score != null && score >= 75 ? '<div style="font-size:10px;color:var(--green3);font-weight:600;margin-top:2px">✓ Lulus</div>' : ""}
        ${score != null && score < 75 ? '<div style="font-size:10px;color:var(--red2);font-weight:600;margin-top:2px">✗ Remedial</div>' : ""}
        ${score == null && s.submitted_at ? '<div style="font-size:10px;color:var(--amber)">menghitung...</div>' : ""}
      </div>
      <div style="color:var(--muted);font-size:18px">›</div>
    </div>`;
          })
          .join("");
      }

      let currentStudentSessionId = null; // untuk grade essay

      async function showDetail(studentId) {
        const stu = nilaiData.find((s) => (s.student_id || s.id) === studentId);
        // Simpan session_id untuk grading essay
        currentStudentSessionId = stu?.session_id || null;
        if (!stu) return;
        const score = stu.score != null ? parseFloat(stu.score) : null;
        const color =
          score == null
            ? "#888"
            : score >= 90
              ? "#1d9e75"
              : score >= 75
                ? "#378add"
                : score >= 60
                  ? "#ef9f27"
                  : "#e24b4a";
        const grade =
          score == null
            ? "—"
            : score >= 90
              ? "A"
              : score >= 75
                ? "B"
                : score >= 60
                  ? "C"
                  : "D";
        const msg =
          score == null
            ? ""
            : score >= 90
              ? "🌟 Luar biasa!"
              : score >= 75
                ? "👍 Bagus, lulus!"
                : score >= 60
                  ? "💪 Lumayan, perlu belajar lagi"
                  : "📚 Perlu remedial";

        document.getElementById("dp-avatar").textContent = (stu.name || "?")[0];
        document.getElementById("dp-avatar").style.background = getColor(
          stu.name || "X",
        );
        document.getElementById("dp-name").textContent = stu.name;
        document.getElementById("dp-class").textContent =
          (stu.class_name || "—") +
          (stu.tab_violations > 0
            ? ` · ⚠ ${stu.tab_violations} pelanggaran`
            : "");
        document.getElementById("dp-time").textContent = stu.submitted_at
          ? "📅 Submit " + UI.fmtTime(stu.submitted_at)
          : "Belum submit";
        document.getElementById("dp-score-summary").textContent =
          `${stu.correct_count ?? 0} benar dari ${(stu.correct_count ?? 0) + (stu.wrong_count ?? 0) + (stu.empty_count ?? 0)} soal`;

        document.getElementById("dp-stats").innerHTML = `
    <div style="flex:1;background:rgba(255,255,255,.12);border-radius:12px;padding:.75rem;text-align:center">
      <div style="font-size:32px;font-weight:800;color:${color}">${score != null ? score.toFixed(1) : "—"}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5)">Nilai ${grade}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.7);font-weight:600;margin-top:2px">${msg}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="background:rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:#4ade80">${stu.correct_count ?? "—"}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.5)">Benar</div>
      </div>
      <div style="background:rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:#f87171">${stu.wrong_count ?? "—"}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.5)">Salah</div>
      </div>
      <div style="background:rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:rgba(255,255,255,.5)">${stu.empty_count ?? "—"}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.5)">Kosong</div>
      </div>
    </div>
  `;

        document.getElementById("modal-detail").classList.add("show");
        document.getElementById("dp-questions").innerHTML =
          '<div class="loading-spinner" style="margin:2rem auto;width:28px;height:28px"></div>';

        try {
          const detail = await API.get(
            `/api/exams/${currentExamId}/student/${studentId}/detail`,
          );
          // Debug: lihat di browser console apakah essay ada
          if (detail._essay_debug) {
            const d = detail._essay_debug;
            console.log('[Essay Debug]', d);
            if (d.error) {
              UI.toast('⚠ Error essay: ' + d.error, 'error');
            } else {
              console.log(`Essay di DB: ${d.count} record(s) untuk session ${d.session_id}`);
            }
          }
          renderDetailQ(detail.questions || []);
        } catch (e) {
          const msg = e.error || e.toString();
          if (msg.includes("belum memulai")) {
            document.getElementById("dp-questions").innerHTML =
              '<div style="padding:2rem;text-align:center;color:var(--muted)">📭 Siswa belum memulai ujian ini</div>';
          } else {
            document.getElementById("dp-questions").innerHTML =
              `<div style="padding:2rem;text-align:center;color:var(--red2)">Gagal memuat: ${msg}</div>`;
          }
        }
      }

      function renderDetailQ(questions) {
        if (!questions.length) {
          document.getElementById("dp-questions").innerHTML =
            '<div style="padding:2rem;text-align:center;color:var(--muted)">Belum ada jawaban tercatat</div>';
          return;
        }
        document.getElementById("dp-questions").innerHTML = questions
          .map((q, i) => {
            const type = q.type || "multiple_choice";

            // ── Camera Essay ──────────────────────────────
            if (type === "camera_essay") {
              const hasEssay = q.essay_text || q.photo_b64;
              const teacherScore = q.teacher_score;
              const scored = teacherScore != null && teacherScore !== '';
              const uid = `essay_${i}_${q.id}`;
              return `<div class="q-item" id="qitem_${uid}">
      <div class="q-status" style="background:${scored ? 'var(--green)' : hasEssay ? '#8b5cf6' : '#e5e7eb'};color:white">
        ${scored ? '✓' : '📷'}
      </div>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">SOAL ${i + 1} · KAMERA+URAIAN</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text);margin-bottom:8px">${q.content}</div>
        ${q.photo_b64 ? `
          <div style="margin-bottom:8px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">📷 Foto jawaban:</div>
            <img src="data:image/jpeg;base64,${q.photo_b64}"
              style="max-width:100%;max-height:260px;border-radius:10px;border:.5px solid var(--border);cursor:zoom-in"
              onclick="this.style.maxHeight=this.style.maxHeight==='260px'?'none':'260px'" />
          </div>` : ''}
        ${q.essay_text ? `
          <div style="background:#f8f9fa;border-radius:8px;padding:10px;border-left:3px solid #8b5cf6;margin-bottom:8px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">✏️ Uraian siswa:</div>
            <div style="font-size:13px;line-height:1.6">${q.essay_text}</div>
          </div>` : ''}
        ${!hasEssay ? '<span class="ans-pill empty">⬜ Belum dijawab</span>' : ''}

        ${hasEssay ? `
        <div style="margin-top:10px;padding:12px;background:#f8f7f3;border-radius:10px;border:.5px solid var(--border)">
          <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px">📝 NILAI GURU
            ${scored ? `<span style="margin-left:8px;color:var(--green);font-weight:600">✅ Sudah dinilai: ${teacherScore}</span>` : `<span style="margin-left:8px;color:#8b5cf6">⏳ Belum dinilai</span>`}
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;align-items:center;gap:8px">
              <label style="font-size:12px;font-weight:600;color:var(--text);min-width:40px">Nilai:</label>
              <input type="number" id="${uid}_score" min="0" max="100"
                value="${teacherScore ?? ''}" placeholder="mis. 85"
                style="width:100px;padding:8px 12px;border:2px solid ${scored ? 'var(--green)' : 'var(--border2)'};border-radius:8px;font-size:18px;font-weight:700;text-align:center;color:var(--green);outline:none"
                onfocus="this.select()" />
              <span style="font-size:12px;color:var(--muted)">(0 – 100)</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <label style="font-size:12px;font-weight:600;color:var(--text);min-width:40px">Catatan:</label>
              <input type="text" id="${uid}_note" placeholder="Catatan untuk siswa (opsional)..."
                value="${q.teacher_note ?? ''}"
                style="flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px" />
            </div>
            <button class="btn btn-primary btn-sm" style="align-self:flex-start;padding:8px 20px"
              onclick="saveEssayGrade('${q.id}','${uid}')">
              💾 Simpan Nilai
            </button>
          </div>
        </div>` : ''}
      </div>
    </div>`;
            }

            // ── Ya/Tidak ──────────────────────────────────
            if (type === "yes_no") {
              const answered = q.student_answer;
              const correct = q.is_correct;
              const statusClass = !answered
                ? "empty"
                : correct
                  ? "correct"
                  : "wrong";
              const statusIcon = !answered ? "—" : correct ? "✓" : "✗";
              return `<div class="q-item">
      <div class="q-status ${statusClass}">${statusIcon}</div>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">SOAL ${i + 1} · YA/TIDAK</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text);margin-bottom:6px">${q.content}</div>
        ${
          !answered
            ? '<span class="ans-pill empty">⬜ Tidak dijawab</span>'
            : correct
              ? `<span class="ans-pill correct">✓ ${q.student_answer}</span>`
              : `<div><span class="ans-pill wrong">✗ ${q.student_answer}</span>
               <div class="correct-ans">↳ Jawaban benar: <strong>${q.correct_answer || "—"}</strong></div></div>`
        }
      </div>
    </div>`;
            }

            // ── Multiple Answer ───────────────────────────
            if (type === "multiple_answer") {
              const answered = q.student_answer;
              const correct = q.is_correct;
              return `<div class="q-item">
      <div class="q-status ${!answered ? "empty" : correct ? "correct" : "wrong"}">${!answered ? "—" : correct ? "✓" : "✗"}</div>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">SOAL ${i + 1} · JAWABAN GANDA</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text);margin-bottom:6px">${q.content}</div>
        ${
          !answered
            ? '<span class="ans-pill empty">⬜ Tidak dijawab</span>'
            : correct
              ? `<span class="ans-pill correct">✓ ${q.student_answer}</span>`
              : `<div><span class="ans-pill wrong">✗ ${q.student_answer}</span>
               <div class="correct-ans">↳ Kunci: <strong>${q.correct_answer || "—"}</strong></div></div>`
        }
      </div>
    </div>`;
            }

            // ── Default: Pilihan Ganda / Audio ────────────
            const empty = !q.student_option_id;
            const correct = q.is_correct;
            const statusClass = empty ? "empty" : correct ? "correct" : "wrong";
            const statusIcon = empty ? "—" : correct ? "✓" : "✗";
            return `<div class="q-item">
      <div class="q-status ${statusClass}">${statusIcon}</div>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">SOAL ${i + 1}${type === "audio" ? " · AUDIO" : ""}</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text);margin-bottom:6px">${q.content}</div>
        ${
          empty
            ? `<span class="ans-pill empty">⬜ Tidak dijawab</span>`
            : correct
              ? `<span class="ans-pill correct">✓ ${q.student_label}. ${q.student_answer}</span>`
              : `<div>
                <span class="ans-pill wrong">✗ ${q.student_label}. ${q.student_answer}</span>
                <div class="correct-ans">↳ Jawaban benar: <strong>${q.correct_label}. ${q.correct_answer || "—"}</strong></div>
              </div>`
        }
      </div>
    </div>`;
          })
          .join("");
      }

      function closeDetail() {
        document.getElementById("modal-detail").classList.remove("show");
      }

      async function exportExcel() {
        try {
          await API.download(
            `/api/exams/${currentExamId}/export-nilai`,
            "rekap_nilai.xlsx",
          );
        } catch {
          UI.toast("Gagal export", "error");
        }
      }

      async function saveEssayGrade(questionId, uid) {
        if (!currentStudentSessionId) { UI.toast('Session tidak ditemukan', 'error'); return; }
        const scoreEl = document.getElementById(`${uid}_score`);
        const noteEl  = document.getElementById(`${uid}_note`);
        const score   = scoreEl ? parseInt(scoreEl.value) : null;
        const note    = noteEl  ? noteEl.value.trim() : '';
        if (score == null || isNaN(score) || score < 0 || score > 100) {
          UI.toast('Nilai harus 0–100', 'warn'); return;
        }
        try {
          await API.patch(
            `/api/exams/${currentExamId}/sessions/${currentStudentSessionId}/grade-essay`,
            { question_id: questionId, score, note }
          );
          UI.toast(`✅ Nilai ${score} disimpan`, 'success');
          // Update tampilan langsung tanpa reload full
          if (scoreEl) scoreEl.style.borderColor = 'var(--green)';
          // Refresh data nilai agar skor total diupdate
          const r = await API.get(`/api/exams/${currentExamId}/results`);
          nilaiData = r.results || [];
          renderCards(nilaiData);
        } catch(e) { UI.toast(e.error || 'Gagal simpan', 'error'); }
      }

      async function exportDetail() {
        UI.loading(true, 'Menyiapkan export detail jawaban...\nProses ini mungkin butuh beberapa detik.');
        try {
          const safeName = currentExamTitle.replace(/[\/\\:*?"<>|]/g, '-') || 'ujian';
          await API.download(
            `/api/exams/${currentExamId}/export-detail`,
            `Nilai_Jawaban_${safeName}.xlsx`,
          );
        } catch(e) {
          UI.toast(e.error || "Gagal export detail", "error");
        } finally {
          UI.loading(false);
        }
      }

      init();
    </script>
  </body>
</html>
